<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Klassenmanager</title>
<script>
// Lokale Datei bevorzugen, CDN als Fallback
(function(){
  var s=document.createElement('script');
  s.src='xlsx.full.min.js';
  s.onerror=function(){
    var f=document.createElement('script');
    f.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    document.head.appendChild(f);
  };
  document.head.appendChild(s);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2/lib/msal-browser.min.js"
        onerror="window._msalFailed=true"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.25)}
header h1{font-size:1.1rem;white-space:nowrap}
.spacer{flex:1}
select#cls-sel{padding:6px 10px;border:1px solid rgba(255,255,255,.4);border-radius:6px;background:rgba(255,255,255,.12);color:#fff;font-size:13px;cursor:pointer;min-width:110px}
select#cls-sel option{background:#1a237e}
.btn{padding:6px 13px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.85}.btn:active{transform:scale(.97)}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35)}
.btn-white{background:#fff;color:#1a237e}
.btn-blue{background:#1e88e5;color:#fff}
.btn-green{background:#43a047;color:#fff}
.btn-red{background:#e53935;color:#fff}
.btn-gray{background:#e0e0e0;color:#333}
.btn-sm{padding:3px 8px;font-size:11px}

nav{background:#fff;border-bottom:2px solid #e8eaf6;display:flex;overflow-x:auto}
nav button{padding:11px 22px;border:none;background:none;cursor:pointer;font-size:13.5px;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;font-weight:500}
nav button.active{color:#1a237e;border-bottom-color:#1a237e}
nav button:hover:not(.active){background:#f5f5f5}

main{padding:16px 20px}
.tab-panel{display:none}.tab-panel.active{display:block}

.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar h3{font-size:15px;color:#1a237e;flex:1}

.tbl-wrap{overflow:auto;max-height:calc(100vh - 210px);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.12);border:1px solid #e0e0e0}
table{border-collapse:collapse;background:#fff;font-size:13px;min-width:100%}
th,td{border:1px solid #e8eaf6;padding:5px 7px;white-space:nowrap}
thead th{background:#e8eaf6;position:sticky;top:0;z-index:2;font-weight:600;text-align:center;color:#283593}
.col-name{position:sticky;left:0;z-index:1;background:#fff;min-width:155px}
thead .col-name{z-index:3}
tbody tr:hover td{background:#fafafa}
tbody tr:hover .col-name{background:#fafafa}

.cell-st{text-align:center;cursor:pointer;padding:2px}
.sbtn{display:inline-block;width:34px;padding:3px 0;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;line-height:1.4}
.s-none{background:#f5f5f5;color:#bbb}
.s-A{background:#c8e6c9;color:#1b5e20}
.s-E{background:#bbdefb;color:#0d47a1}
.s-Q{background:#fff9c4;color:#e65100}
.s-U{background:#ffcdd2;color:#b71c1c}
.s-F{background:#eeeeee;color:#9e9e9e;text-decoration:line-through}

.popup{position:fixed;z-index:500;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px;box-shadow:0 6px 20px rgba(0,0,0,.18);display:flex;flex-direction:column;gap:4px;min-width:148px}
.popup button{text-align:left;padding:5px 10px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.popup button:hover{filter:brightness(.92)}

.cell-sm{text-align:center;padding:2px}
.smrow{display:flex;gap:2px;justify-content:center}
.sm{font-size:16px;cursor:pointer;padding:1px 2px;border-radius:4px;border:2px solid transparent;line-height:1;transition:transform .1s;user-select:none}
.sm:hover{transform:scale(1.3)}
.sm.on{border-color:#1a237e;background:#e8eaf620}

.g1{color:#1b5e20;font-weight:700}.g2{color:#388e3c;font-weight:600}
.g3{color:#f9a825;font-weight:600}.g4{color:#e65100;font-weight:600}
.g5{color:#c62828;font-weight:600}.g6{color:#880e4f;font-weight:700}

.arbeit-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:5px 14px;border-radius:20px;cursor:pointer;font-size:13px;border:1.5px solid #c5cae9;background:#fff;color:#3949ab}
.pill.active{background:#1a237e;color:#fff;border-color:#1a237e}
.pill:hover:not(.active){background:#e8eaf6}

.card{background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.1);border:1px solid #e8eaf6}
.ns-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12.5px;margin-bottom:12px;padding:8px 12px;background:#f5f7ff;border-radius:6px}
.ns-inp{width:42px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:2px 4px;font-size:12px}
.pts-inp{width:54px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:3px;font-size:12px}
.th-inp{width:52px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:2px;font-size:12px;font-weight:500}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;align-items:center;justify-content:center}
#overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px 28px;width:430px;max-width:95vw;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal h2{font-size:1.05rem;margin-bottom:16px;color:#1a237e}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:500}
.field input,.field select{width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:6px;font-size:14px}
.field input:focus,.field select:focus{outline:none;border-color:#1a237e}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.info-txt{font-size:12px;color:#666;margin:-6px 0 10px}

.empty{text-align:center;padding:60px 20px;color:#bbb}
.empty h3{font-size:1.05rem;margin-bottom:6px}
</style>
</head>
<body>

<header>
  <h1>📚 Klassenmanager</h1>
  <select id="cls-sel" onchange="switchClass(this.value)">
    <option value="">– Klasse wählen –</option>
  </select>
  <button class="btn btn-ghost" onclick="openAddClassModal()">+ Klasse</button>
  <button class="btn btn-ghost" onclick="confirmDeleteClass()" title="Aktuelle Klasse löschen">🗑</button>
  <div class="spacer"></div>
  <button class="btn btn-ghost" onclick="triggerImport()" title="Schüler/Termine aus Excel importieren">📥 Excel Import</button>
  <button class="btn btn-white" onclick="exportExcel()" title="Alle Daten als Excel exportieren">📤 Excel Export</button>
  <span style="width:1px;background:rgba(255,255,255,.25);align-self:stretch;margin:0 2px"></span>
  <button id="ms-login-btn" class="btn btn-ghost" onclick="toggleMsLogin()" title="Mit Microsoft-Konto anmelden für automatischen OneDrive-Sync">☁️ Microsoft-Konto</button>
  <button class="btn btn-ghost" onclick="openDataFile()" title="Datendatei aus OneDrive-Ordner öffnen und verknüpfen (lokal)">📂 Datei laden</button>
  <button class="btn btn-ghost" onclick="createDataFile()" title="Neue Datendatei im OneDrive-Ordner anlegen (lokal)">🆕 Neue Datei</button>
  <span id="save-status" style="font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap">⚪ nicht verknüpft</span>
  <input type="file" id="file-in" accept=".xlsx,.xls" multiple style="display:none" onchange="handleFiles(event)">
</header>

<nav>
  <button class="active" data-tab="anwesenheit" onclick="switchTab(this)">Anwesenheit</button>
  <button data-tab="muendlich" onclick="switchTab(this)">Mündliche Mitarbeit</button>
  <button data-tab="noten" onclick="switchTab(this)">Notenübersicht</button>
  <button data-tab="arbeiten" onclick="switchTab(this)">Klassenarbeiten</button>
</nav>

<div id="sync-banner" style="display:none;background:#fff8e1;border-bottom:1px solid #ffe082;padding:8px 20px;font-size:13px;color:#5d4037;display:flex;align-items:center;gap:12px">
  <span>🔄</span>
  <span id="sync-banner-text"></span>
  <button id="sync-banner-btn" onclick="openDataFile()" style="padding:4px 12px;border:1px solid #f9a825;border-radius:5px;background:#fff3e0;color:#e65100;cursor:pointer;font-size:12px;font-weight:600">📂 Jetzt laden</button>
  <button onclick="dismissBanner()" style="margin-left:auto;background:none;border:none;color:#999;cursor:pointer;font-size:16px" title="Schließen">×</button>
</div>

<main>
  <div id="tab-anwesenheit" class="tab-panel active">
    <div class="toolbar">
      <h3>Anwesenheit</h3>
      <button class="btn btn-blue" onclick="openAddSchuelerModal()">+ Schüler</button>
      <button class="btn btn-green" onclick="openAddTerminModal()">+ Termin</button>
    </div>
    <div id="anw-wrap" class="tbl-wrap"></div>
  </div>

  <div id="tab-muendlich" class="tab-panel">
    <div class="toolbar">
      <h3>Mündliche Mitarbeit</h3>
      <span style="font-size:12px;color:#888">Smiley anklicken = Note vergeben / erneut anklicken = löschen</span>
    </div>
    <div id="mu-wrap" class="tbl-wrap"></div>
  </div>

  <div id="tab-noten" class="tab-panel">
    <div class="toolbar">
      <h3>Notenübersicht</h3>
      <button class="btn btn-gray" onclick="openGewichtungModal()">⚙ Gewichtung</button>
    </div>
    <div id="no-wrap" class="tbl-wrap"></div>
  </div>

  <div id="tab-arbeiten" class="tab-panel">
    <div class="toolbar">
      <h3>Klassenarbeiten</h3>
      <button class="btn btn-green" onclick="addArbeit()">+ Arbeit hinzufügen</button>
    </div>
    <div id="arbeit-pills" class="arbeit-pills"></div>
    <div id="arbeit-body"></div>
  </div>
</main>

<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box"></div>
</div>

<script>
// ══════════════════════════════════════════
// KONSTANTEN
// ══════════════════════════════════════════
const SMILEYS   = ['🤬','😢','😞','😐','🙂','😄'];
const SM_LABELS = ['Ungenügend (6)','Mangelhaft (5)','Ausreichend (4)','Befriedigend (3)','Gut (2)','Sehr gut (1)'];
const SM_GRADES = [6, 5, 4, 3, 2, 1];
const SM_COLORS = ['#880e4f','#c62828','#e65100','#f9a825','#388e3c','#1b5e20'];

const STATUS_CFG = {
  A: {label:'A',    title:'Anwesend',           cls:'s-A'},
  E: {label:'E',    title:'Entschuldigt',        cls:'s-E'},
  Q: {label:'?',    title:'Offen (nicht entsch.)',cls:'s-Q'},
  U: {label:'U',    title:'Unentschuldigt',      cls:'s-U'},
  F: {label:'—',    title:'Unterrichtsausfall',  cls:'s-F'},
  '': {label:'–',   title:'Nicht eingetragen',   cls:'s-none'},
};

// ══════════════════════════════════════════
// STATE & PERSISTENZ
// ══════════════════════════════════════════
let state = { classes: {}, cur: null, curArbeit: 0 };

function loadState() {
  try { const s = localStorage.getItem('km_v3'); if (s) Object.assign(state, JSON.parse(s)); } catch(e) {}
  setSaveStatus('⚪ nicht verknüpft', 'rgba(255,255,255,.45)');
}

function showSyncBanner() {
  const banner = document.getElementById('sync-banner');
  const text   = document.getElementById('sync-banner-text');
  if (!banner || !text) return;
  const ts = localStorage.getItem('km_v3_ts');
  const hasData = Object.keys(state.classes).length > 0;
  if (hasData && ts) {
    const d = new Date(ts);
    const fmt = d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})
              + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    text.textContent = `Lokaler Stand vom ${fmt}. Auf anderem Gerät gearbeitet? → Datei laden für aktuellen OneDrive-Stand.`;
  } else if (!hasData) {
    text.textContent = 'Noch keine Daten. Neue Klasse anlegen oder Datendatei aus OneDrive laden.';
  } else {
    text.textContent = 'Für OneDrive-Sync: Datendatei laden.';
  }
  banner.style.display = 'flex';
}

function dismissBanner() {
  const b = document.getElementById('sync-banner');
  if (b) b.style.display = 'none';
}
function saveLocal() {
  try {
    localStorage.setItem('km_v3', JSON.stringify(state));
    localStorage.setItem('km_v3_ts', new Date().toISOString());
  } catch(e) {}
}
function save() {
  saveLocal();
  if (getMsalAccount()) scheduleGraphSave();
  else writeToHandle();
}
function cls() { return state.cur ? state.classes[state.cur] : null; }

// ══════════════════════════════════════════
// KLASSEN-VERWALTUNG
// ══════════════════════════════════════════
function switchClass(name) {
  state.cur = name || null;
  state.curArbeit = 0;
  save(); updateDropdown(); renderAll();
}

function addNewClass(name, schueler, termine) {
  schueler = schueler || [];
  termine  = termine  || [];
  if (!name || state.classes[name]) return;
  state.classes[name] = {
    name, schueler, termine,
    anwesenheit: {},
    muendlich:   {},
    arbeiten:    [],
    gewichtung:  { m: 40, a: 60 }
  };
  state.cur = name;
  save(); updateDropdown(); renderAll();
}

function updateDropdown() {
  const sel = document.getElementById('cls-sel');
  sel.innerHTML = '<option value="">– Klasse wählen –</option>';
  Object.keys(state.classes).sort().forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    if (n === state.cur) o.selected = true;
    sel.appendChild(o);
  });
}

function confirmDeleteClass() {
  const k = cls(); if (!k) return;
  if (!confirm(`Klasse "${k.name}" und alle Daten endgültig löschen?`)) return;
  delete state.classes[state.cur];
  state.cur = null;
  save(); updateDropdown(); renderAll();
}

// ══════════════════════════════════════════
// RENDER-DISPATCH
// ══════════════════════════════════════════
function renderAll() {
  const k = cls();
  renderAnwesenheit(k);
  renderMuendlich(k);
  renderNoten(k);
  renderArbeiten(k);
}

function emptyHtml(msg, sub) {
  return `<div class="empty"><h3>${msg}</h3>${sub ? '<p>' + sub + '</p>' : ''}</div>`;
}

// ══════════════════════════════════════════
// ANWESENHEIT
// ══════════════════════════════════════════
function renderAnwesenheit(k) {
  const wrap = document.getElementById('anw-wrap');
  if (!k)              { wrap.innerHTML = emptyHtml('Keine Klasse gewählt'); return; }
  if (!k.schueler.length) { wrap.innerHTML = emptyHtml('Keine Schüler', 'Schüler über "+ Schüler" hinzufügen oder Excel importieren.'); return; }
  if (!k.termine.length) {
    let h = `<div style="padding:16px">
      <div style="background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#e65100">
        ⚠ Noch keine Unterrichtstermine – Tabelle erscheint sobald du einen Termin hinzufügst.
      </div>
      <table><thead><tr><th class="col-name">Name</th></tr></thead><tbody>`;
    k.schueler.forEach((s, si) => {
      h += `<tr><td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}
        <button class="btn btn-sm" style="margin-left:4px;background:#ffebee;color:#c62828" onclick="confirmDeleteSchueler(${si})" title="Schüler löschen">×</button>
      </td></tr>`;
    });
    h += `</tbody></table></div>`;
    wrap.innerHTML = h;
    return;
  }

  const sorted = [...k.termine].sort((a, b) => a.datum.localeCompare(b.datum));
  let h = '<table><thead><tr><th class="col-name">Name</th>';

  sorted.forEach(t => {
    h += `<th style="min-width:64px">
      <div>${fmtDate(t.datum)}</div>
      <div style="font-size:10px;font-weight:400;color:#5c6bc0;max-width:80px;overflow:hidden;text-overflow:ellipsis" title="${esc(t.thema)}">${esc(t.thema)}</div>
      <button class="btn btn-sm" style="margin-top:3px;background:#eceff1;color:#546e7a" onclick="ausfallColumn('${t.datum}')">Ausfall</button>
      <button class="btn btn-sm" style="margin-top:2px;background:#ffebee;color:#c62828" onclick="confirmDeleteTermin('${t.datum}')">×</button>
    </th>`;
  });
  h += '<th style="min-width:60px;text-align:center">Fehltage</th></tr></thead><tbody>';

  k.schueler.forEach((s, si) => {
    h += `<tr><td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}
      <button class="btn btn-sm" style="margin-left:4px;background:#ffebee;color:#c62828" onclick="confirmDeleteSchueler(${si})" title="Schüler löschen">×</button>
    </td>`;
    let fehlt = 0;
    sorted.forEach(t => {
      const st = (k.anwesenheit[si] || {})[t.datum] || '';
      if (st === 'E' || st === 'Q' || st === 'U') fehlt++;
      const cfg = STATUS_CFG[st] || STATUS_CFG[''];
      h += `<td class="cell-st" onclick="showStatusPopup(event,${si},'${t.datum}')">
        <button class="sbtn ${cfg.cls}" title="${cfg.title}">${cfg.label}</button>
      </td>`;
    });
    const fc = fehlt > 5 ? '#c62828' : fehlt > 2 ? '#e65100' : '#555';
    h += `<td style="text-align:center;font-weight:600;color:${fc}">${fehlt}</td></tr>`;
  });

  // Summenzeile
  h += '<tr style="background:#f5f5f5;font-weight:600"><td class="col-name" style="background:#f5f5f5">∑ Klasse</td>';
  sorted.forEach(t => {
    const cnt = {A:0,E:0,Q:0,U:0,F:0};
    k.schueler.forEach((s,si) => { const st=(k.anwesenheit[si]||{})[t.datum]; if(st)cnt[st]++; });
    h += `<td style="text-align:center;font-size:11px;line-height:1.8">
      <span style="color:#1b5e20">${cnt.A}×A</span> <span style="color:#0d47a1">${cnt.E}×E</span> <span style="color:#b71c1c">${cnt.U}×U</span>
    </td>`;
  });
  h += '<td></td></tr></tbody></table>';
  wrap.innerHTML = h;
}

let _popup = null;
function showStatusPopup(ev, si, datum) {
  ev.stopPropagation();
  closePopup();
  const p = document.createElement('div');
  p.className = 'popup';
  const r = ev.currentTarget.getBoundingClientRect();
  p.style.top  = Math.min(r.bottom + 4, window.innerHeight - 230) + 'px';
  p.style.left = Math.max(4, Math.min(r.left, window.innerWidth - 160)) + 'px';

  [
    {st:'A', label:'✓  Anwesend',          cls:'s-A'},
    {st:'E', label:'E  Entschuldigt',       cls:'s-E'},
    {st:'Q', label:'?  Offen',              cls:'s-Q'},
    {st:'U', label:'U  Unentschuldigt',     cls:'s-U'},
    {st:'F', label:'—  Unterrichtsausfall', cls:'s-F'},
    {st:'',  label:'×  Leer',              cls:'s-none'},
  ].forEach(o => {
    const b = document.createElement('button');
    b.className = o.cls; b.textContent = o.label;
    b.onclick = ev2 => { ev2.stopPropagation(); setAnwesenheit(si, datum, o.st); closePopup(); };
    p.appendChild(b);
  });

  document.body.appendChild(p);
  _popup = p;
  setTimeout(() => document.addEventListener('click', closePopup, {once:true}), 0);
}
function closePopup() { if (_popup) { _popup.remove(); _popup = null; } }

function setAnwesenheit(si, datum, status) {
  const k = cls(); if (!k) return;
  if (!k.anwesenheit[si]) k.anwesenheit[si] = {};
  if (status === '') delete k.anwesenheit[si][datum];
  else k.anwesenheit[si][datum] = status;
  save(); renderAnwesenheit(k);
}

function ausfallColumn(datum) {
  const k = cls(); if (!k) return;
  k.schueler.forEach((s, si) => {
    if (!k.anwesenheit[si]) k.anwesenheit[si] = {};
    k.anwesenheit[si][datum] = 'F';
  });
  save(); renderAnwesenheit(k);
}

function confirmDeleteSchueler(si) {
  const k = cls(); if (!k) return;
  const s = k.schueler[si];
  if (!confirm(`"${s.vorname} ${s.nachname}" entfernen?`)) return;
  k.schueler.splice(si, 1);
  // Shift-Indizes neu aufbauen
  function shiftObj(obj) {
    const out = {};
    Object.entries(obj).forEach(([i,v]) => { const n=parseInt(i); if(n<si)out[n]=v; else if(n>si)out[n-1]=v; });
    return out;
  }
  k.anwesenheit = shiftObj(k.anwesenheit);
  k.muendlich   = shiftObj(k.muendlich);
  k.arbeiten.forEach(arb => { arb.ergebnisse = shiftObj(arb.ergebnisse || {}); });
  save(); renderAll();
}

function confirmDeleteTermin(datum) {
  const k = cls(); if (!k) return;
  const t = k.termine.find(x => x.datum === datum);
  if (!confirm(`Termin ${fmtDate(datum)} (${esc(t ? t.thema : '')}) löschen?`)) return;
  k.termine = k.termine.filter(x => x.datum !== datum);
  k.schueler.forEach((s,si) => {
    if (k.anwesenheit[si]) delete k.anwesenheit[si][datum];
    if (k.muendlich[si])   delete k.muendlich[si][datum];
  });
  save(); renderAll();
}

// ══════════════════════════════════════════
// MÜNDLICHE MITARBEIT
// ══════════════════════════════════════════
function renderMuendlich(k) {
  const wrap = document.getElementById('mu-wrap');
  if (!k)                 { wrap.innerHTML = emptyHtml('Keine Klasse gewählt'); return; }
  if (!k.schueler.length) { wrap.innerHTML = emptyHtml('Keine Schüler'); return; }
  if (!k.termine.length)  { wrap.innerHTML = emptyHtml('Keine Termine', 'Unterrichtstermine über "+ Termin" im Anwesenheit-Tab hinzufügen.'); return; }

  const sorted = [...k.termine].sort((a,b) => a.datum.localeCompare(b.datum));
  let h = '<table><thead><tr><th class="col-name">Name</th>';
  sorted.forEach(t => {
    h += `<th style="min-width:144px"><div>${fmtDate(t.datum)}</div><div style="font-size:10px;font-weight:400;color:#5c6bc0">${esc(t.thema)}</div></th>`;
  });
  h += '<th style="min-width:70px;text-align:center">Ø Note</th></tr></thead><tbody>';

  k.schueler.forEach((s, si) => {
    h += `<tr><td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}</td>`;
    let sum = 0, cnt = 0;
    sorted.forEach(t => {
      const r = (k.muendlich[si] || {})[t.datum];
      const smRow = SMILEYS.map((em, idx) => {
        const on = r === idx;
        return `<span class="sm ${on?'on':''}" title="${SM_LABELS[idx]}"
          style="${on ? `border-color:${SM_COLORS[idx]};background:${SM_COLORS[idx]}22` : ''}"
          onclick="toggleMuendlich(${si},'${t.datum}',${idx})">${em}</span>`;
      }).join('');
      h += `<td class="cell-sm"><div class="smrow">${smRow}</div></td>`;
      if (r !== undefined && r !== null) { sum += SM_GRADES[r]; cnt++; }
    });
    if (cnt > 0) {
      const avg = sum / cnt;
      const gi  = Math.min(6, Math.max(1, Math.round(avg)));
      h += `<td style="text-align:center"><span class="g${gi}" style="font-size:1.1rem">${avg.toFixed(1)}</span></td>`;
    } else {
      h += '<td style="text-align:center;color:#bbb">—</td>';
    }
    h += '</tr>';
  });

  h += '</tbody></table>';
  wrap.innerHTML = h;
}

function toggleMuendlich(si, datum, idx) {
  const k = cls(); if (!k) return;
  if (!k.muendlich[si]) k.muendlich[si] = {};
  if (k.muendlich[si][datum] === idx) delete k.muendlich[si][datum];
  else k.muendlich[si][datum] = idx;
  save(); renderMuendlich(k);
}

// ══════════════════════════════════════════
// NOTEN
// ══════════════════════════════════════════
function muendlichAvgGrade(si) {
  const k = cls(); if (!k) return null;
  const ratings = Object.values(k.muendlich[si] || {});
  if (!ratings.length) return null;
  const grades = ratings.map(r => SM_GRADES[r]);
  return grades.reduce((a,b)=>a+b,0) / grades.length;
}

function arbeitGrade(arb, si) {
  const ergs = (arb.ergebnisse || {})[si];
  if (!ergs || !ergs.some(e => e !== '' && e !== undefined && e !== null)) return null;
  const maxTotal = arb.aufgaben.reduce((s,a) => s+(parseFloat(a.punkte)||0), 0);
  if (!maxTotal) return null;
  const earned = ergs.reduce((s,p) => s+(parseFloat(p)||0), 0);
  const pct = earned / maxTotal * 100;
  const ns = Array.isArray(arb.notenschluessel) ? arb.notenschluessel : [90,75,60,45,30];
  for (let i = 0; i < ns.length; i++) { if (pct >= ns[i]) return i + 1; }
  return 6;
}

function renderNoten(k) {
  const wrap = document.getElementById('no-wrap');
  if (!k)                 { wrap.innerHTML = emptyHtml('Keine Klasse gewählt'); return; }
  if (!k.schueler.length) { wrap.innerHTML = emptyHtml('Keine Schüler'); return; }

  const mG = k.gewichtung.m, aG = k.gewichtung.a;
  let h = `<table><thead><tr>
    <th class="col-name">Name</th>
    <th>Mündlich (${mG}%)</th>`;
  k.arbeiten.forEach(a => h += `<th>${esc(a.name)}</th>`);
  h += '<th>Gesamtnote</th></tr></thead><tbody>';

  const fmtG = g => g !== null
    ? `<span class="g${Math.min(6,Math.max(1,Math.round(g)))}">${typeof g === 'number' ? g.toFixed(1) : g}</span>`
    : '<span style="color:#bbb">—</span>';

  k.schueler.forEach((s, si) => {
    const mAvg   = muendlichAvgGrade(si);
    const aGrades = k.arbeiten.map(a => arbeitGrade(a, si));
    const validA  = aGrades.filter(g => g !== null);
    const aAvg    = validA.length ? validA.reduce((a,b)=>a+b,0)/validA.length : null;

    let final = null;
    if (mAvg !== null && aAvg !== null) final = (mAvg*mG + aAvg*aG) / (mG+aG);
    else if (mAvg !== null) final = mAvg;
    else if (aAvg !== null) final = aAvg;

    h += `<tr>
      <td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}</td>
      <td style="text-align:center">${fmtG(mAvg)}</td>`;
    aGrades.forEach(g => h += `<td style="text-align:center">${fmtG(g)}</td>`);
    h += `<td style="text-align:center;font-size:1.05rem">${fmtG(final)}</td></tr>`;
  });

  h += '</tbody></table>';
  wrap.innerHTML = h;
}

// ══════════════════════════════════════════
// KLASSENARBEITEN
// ══════════════════════════════════════════
function addArbeit() {
  const k = cls(); if (!k) { alert('Bitte zuerst eine Klasse wählen.'); return; }
  k.arbeiten.push({
    name: `Arbeit ${k.arbeiten.length + 1}`,
    datum: new Date().toISOString().slice(0,10),
    aufgaben: [{name:'A1', punkte:10}],
    ergebnisse: {},
    notenschluessel: [90, 75, 60, 45, 30]
  });
  state.curArbeit = k.arbeiten.length - 1;
  save(); renderArbeiten(k); renderNoten(k);
}

function switchArbeitPill(idx) { state.curArbeit = idx; renderArbeiten(cls()); }

function renderArbeiten(k) {
  const pills = document.getElementById('arbeit-pills');
  const body  = document.getElementById('arbeit-body');
  if (!k || !k.schueler.length) {
    pills.innerHTML = '';
    body.innerHTML = emptyHtml('Keine Schüler', 'Füge zuerst Schüler hinzu.');
    return;
  }
  if (!k.arbeiten.length) {
    pills.innerHTML = '';
    body.innerHTML = emptyHtml('Noch keine Klassenarbeit', 'Klicke auf "+ Arbeit hinzufügen".');
    return;
  }

  pills.innerHTML = k.arbeiten.map((a,i) =>
    `<span class="pill ${i===state.curArbeit?'active':''}" onclick="switchArbeitPill(${i})">${esc(a.name)}</span>`
  ).join('');

  const ai  = Math.min(state.curArbeit, k.arbeiten.length - 1);
  const arb = k.arbeiten[ai];
  if (!arb) { body.innerHTML = ''; return; }

  const maxTotal = arb.aufgaben.reduce((s,a) => s+(parseFloat(a.punkte)||0), 0);
  const ns = Array.isArray(arb.notenschluessel) ? arb.notenschluessel : [90,75,60,45,30];

  const nsBar = ns.map((th, i) =>
    `<span class="g${i+1}" style="display:flex;align-items:center;gap:3px">
      Note ${i+1} ab <input class="ns-inp" type="number" min="0" max="100" value="${th}"
        onchange="updateNS(${ai},${i},this.value)">%
    </span>`
  ).join('');

  let h = `<div class="card">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <input value="${esc(arb.name)}" style="font-size:14px;font-weight:600;border:1.5px solid #e0e0e0;border-radius:6px;padding:5px 10px;width:160px"
        onchange="arbRename(${ai},this.value)">
      <input type="date" value="${arb.datum||''}" style="border:1.5px solid #e0e0e0;border-radius:6px;padding:5px 8px"
        onchange="arbSetDate(${ai},this.value)">
      <span style="color:#888;font-size:12px">Max: ${maxTotal} Punkte</span>
      <div style="flex:1"></div>
      <button class="btn btn-sm" style="background:#ffebee;color:#c62828" onclick="confirmDeleteArbeit(${ai})">🗑 Löschen</button>
    </div>
    <div class="ns-bar"><strong>Notenschlüssel:</strong>${nsBar}</div>
    <div class="tbl-wrap" style="max-height:calc(100vh - 345px)">
    <table><thead><tr><th class="col-name">Name</th>`;

  arb.aufgaben.forEach((auf, oi) => {
    h += `<th style="min-width:90px;text-align:center">
      <input class="th-inp" value="${esc(auf.name)}" onchange="arbAufgName(${ai},${oi},this.value)"><br>
      <input class="th-inp" type="number" value="${auf.punkte}" min="0" step="0.5"
        onchange="arbAufgPunkte(${ai},${oi},this.value)"> P
      <button onclick="confirmDeleteAufgabe(${ai},${oi})" style="border:none;background:none;color:#bbb;cursor:pointer" title="Aufgabe löschen">×</button>
    </th>`;
  });
  h += `<th style="text-align:center"><button onclick="addAufgabe(${ai})" class="btn btn-sm" style="background:#e8f5e9;color:#2e7d32">+ Aufg.</button></th>
    <th style="text-align:center">Gesamt</th>
    <th style="text-align:center">Note</th>
  </tr></thead><tbody>`;

  k.schueler.forEach((s, si) => {
    if (!arb.ergebnisse[si]) arb.ergebnisse[si] = [];
    let earned = 0;
    h += `<tr><td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}</td>`;
    arb.aufgaben.forEach((auf, oi) => {
      const v = arb.ergebnisse[si][oi] !== undefined ? arb.ergebnisse[si][oi] : '';
      if (v !== '') earned += parseFloat(v) || 0;
      h += `<td style="text-align:center"><input class="pts-inp" type="number" value="${v}" min="0" max="${auf.punkte}" step="0.5"
        onchange="setErgebnis(${ai},${si},${oi},this.value)" id="pts-${ai}-${si}-${oi}"></td>`;
    });
    const pct = maxTotal ? (earned/maxTotal*100).toFixed(1) : '—';
    const g   = arbeitGrade(arb, si);
    h += `<td></td>
      <td style="text-align:center;font-size:12px" id="tot-${ai}-${si}">${earned}/${maxTotal}<br><span style="color:#888">${pct}%</span></td>
      <td style="text-align:center" id="grd-${ai}-${si}">${g ? `<span class="g${g}" style="font-size:1.1rem">${g}</span>` : '—'}</td>
    </tr>`;
  });

  // Klassenschnitt
  const vGrades = k.schueler.map((_,si) => arbeitGrade(arb,si)).filter(g=>g!==null);
  const avgG    = vGrades.length ? (vGrades.reduce((a,b)=>a+b,0)/vGrades.length).toFixed(1) : '—';
  h += `<tr style="background:#f5f5f5;font-weight:600"><td class="col-name" style="background:#f5f5f5">Ø Klasse</td>`;
  arb.aufgaben.forEach((auf,oi) => {
    const colAvg = k.schueler.reduce((_,s,si)=>{
      return _ + (parseFloat((arb.ergebnisse[si]||[])[oi])||0);
    },0) / k.schueler.length;
    h += `<td style="text-align:center;color:#555">${colAvg.toFixed(1)}</td>`;
  });
  h += `<td></td><td style="text-align:center"></td><td style="text-align:center">⌀ ${avgG}</td></tr>`;
  h += '</tbody></table></div></div>';
  body.innerHTML = h;
}

function setErgebnis(ai, si, oi, val) {
  const k = cls(); if (!k) return;
  const arb = k.arbeiten[ai];
  if (!arb.ergebnisse[si]) arb.ergebnisse[si] = [];
  arb.ergebnisse[si][oi] = val === '' ? '' : parseFloat(val) || 0;
  save();
  // Nur Summen-Zelle und Noten-Zelle updaten
  const ergs = arb.ergebnisse[si];
  const maxT  = arb.aufgaben.reduce((s,a)=>s+(parseFloat(a.punkte)||0),0);
  const earn  = ergs.reduce((s,p)=>s+(parseFloat(p)||0),0);
  const pct   = maxT ? (earn/maxT*100).toFixed(1) : '—';
  const g     = arbeitGrade(arb, si);
  const tc = document.getElementById(`tot-${ai}-${si}`);
  const gc = document.getElementById(`grd-${ai}-${si}`);
  if (tc) tc.innerHTML = `${earn}/${maxT}<br><span style="color:#888">${pct}%</span>`;
  if (gc) gc.innerHTML = g ? `<span class="g${g}" style="font-size:1.1rem">${g}</span>` : '—';
  renderNoten(k);
}

function addAufgabe(ai) {
  const k = cls(); if (!k) return;
  const arb = k.arbeiten[ai];
  arb.aufgaben.push({name:`A${arb.aufgaben.length+1}`, punkte:10});
  save(); renderArbeiten(k);
}

function confirmDeleteAufgabe(ai, oi) {
  if (!confirm('Aufgabe löschen?')) return;
  const k = cls(); if (!k) return;
  k.arbeiten[ai].aufgaben.splice(oi, 1);
  Object.values(k.arbeiten[ai].ergebnisse).forEach(e => e.splice(oi, 1));
  save(); renderArbeiten(k);
}

function confirmDeleteArbeit(ai) {
  const k = cls(); if (!k) return;
  if (!confirm(`"${k.arbeiten[ai].name}" löschen?`)) return;
  k.arbeiten.splice(ai, 1);
  state.curArbeit = Math.max(0, ai - 1);
  save(); renderArbeiten(k); renderNoten(k);
}

function arbRename(ai, v)        { const k=cls();if(!k)return;k.arbeiten[ai].name=v;save();renderArbeiten(k); }
function arbSetDate(ai, v)       { const k=cls();if(!k)return;k.arbeiten[ai].datum=v;save(); }
function arbAufgName(ai,oi,v)    { const k=cls();if(!k)return;k.arbeiten[ai].aufgaben[oi].name=v;save(); }
function arbAufgPunkte(ai,oi,v)  { const k=cls();if(!k)return;k.arbeiten[ai].aufgaben[oi].punkte=parseFloat(v)||0;save();renderArbeiten(k);renderNoten(k); }
function updateNS(ai, idx, v)    { const k=cls();if(!k)return;if(!Array.isArray(k.arbeiten[ai].notenschluessel))k.arbeiten[ai].notenschluessel=[90,75,60,45,30];k.arbeiten[ai].notenschluessel[idx]=parseFloat(v)||0;save();renderArbeiten(k);renderNoten(k); }

function openAddTerminModal() {
  if (!cls()) { alert('Bitte zuerst eine Klasse wählen.'); return; }
  const today = new Date().toISOString().slice(0,10);
  showModal(`<h2>Termin hinzufügen</h2>
    <div class="field"><label>Datum</label><input type="date" id="m-dat" value="${today}" onkeydown="if(event.key==='Enter')document.getElementById('m-thm').focus()"></div>

    <div class="mbtns">
      <button class="btn btn-gray" onclick="closeModal()">Abbrechen</button>

function doAddTermin(more) {
  const k = cls(); if (!k) return;
  const dat = document.getElementById('m-dat').value; if (!dat) return;

// MICROSOFT GRAPH / MSAL (Schule via GitHub Pages)
// ══════════════════════════════════════════
// Einrichtung: App auf GitHub Pages hosten (index.html), dann in Azure App-Registrierung
// die GitHub Pages URL als Redirect URI (Typ: SPA) eintragen.
// Graph API schreibt in denselben Pfad wie die lokale JSON-Datei:
const MS_CLIENT_ID = '3e2c3604-c31d-465d-bed4-777eff1e0b34';
const MS_TENANT_ID = '1ec883c9-e58e-4a81-a220-9f26696a86fd';
const GRAPH_FILE   = 'https://graph.microsoft.com/v1.0/me/drive/root:/Schule/Schuljahr 2026_2027/klassenmanager_data.json:/content';

let msalApp = null;
let _graphTimer = null;

function initMsal() {
  if (typeof msal === 'undefined' || window._msalFailed) {
    const btn = document.getElementById('ms-login-btn');
    if (btn) btn.style.display = 'none';
    return;
  }
  const redirectUri = window.location.protocol === 'https:'
    ? window.location.origin + window.location.pathname
    : 'http://localhost';
  msalApp = new msal.PublicClientApplication({
    auth: { clientId: MS_CLIENT_ID, authority: `https://login.microsoftonline.com/${MS_TENANT_ID}`, redirectUri },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false }
  });
  msalApp.handleRedirectPromise().then(async (result) => {
    updateMsBtn();
    updateSyncBannerBtn();
    if (result || getMsalAccount()) {
      setSaveStatus('⏳ OneDrive...', '#fff176');
      await loadFromGraph();
    }
  }).catch(e => { console.warn('MSAL:', e); updateMsBtn(); });
}

function getMsalAccount() {
  if (!msalApp) return null;
  const accs = msalApp.getAllAccounts();
  return accs.length ? accs[0] : null;
}

function updateMsBtn() {
  const btn = document.getElementById('ms-login-btn');
  if (!btn) return;
  const acc = getMsalAccount();
  if (acc) {
    btn.textContent = `👤 ${(acc.name||acc.username||'?').split(' ')[0]} · Abmelden`;
    btn.title = 'Von Microsoft abmelden';
    btn.style.background = 'rgba(255,255,255,.25)';
  } else {
    btn.textContent = '☁️ Microsoft-Konto';
    btn.title = 'Mit Microsoft-Konto anmelden für automatischen OneDrive-Sync';
    btn.style.background = 'rgba(255,255,255,.15)';
  }
}

function updateSyncBannerBtn() {
  const btn = document.getElementById('sync-banner-btn');
  if (!btn || !msalApp || window.location.protocol !== 'https:') return;
  btn.textContent = '☁️ Microsoft anmelden';
  btn.onclick = toggleMsLogin;
}

async function toggleMsLogin() {
  if (!msalApp || window.location.protocol !== 'https:') {
    alert('Microsoft-Login ist nur über eine HTTPS-URL verfügbar (z. B. GitHub Pages).\n\nFür lokale Nutzung zu Hause: weiterhin "📂 Datei laden" verwenden.');
    return;
  }
  const acc = getMsalAccount();
  if (acc) {
    if (!confirm(`${acc.name || acc.username} abmelden?`)) return;
    try { await msalApp.logoutRedirect({ account: acc, postLogoutRedirectUri: window.location.href }); } catch(e) {}
  } else {
    try {
      setSaveStatus('⏳ Anmeldung...', '#fff176');
      await msalApp.loginRedirect({ scopes: ['Files.ReadWrite'] });
    } catch(e) {
      if (e.errorCode !== 'user_cancelled') console.error('MSAL login:', e);
      setSaveStatus('⚪ nicht verknüpft', 'rgba(255,255,255,.45)');
    }
  }
}

async function getToken() {
  const acc = getMsalAccount();
  if (!acc) throw new Error('Nicht angemeldet');
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: ['Files.ReadWrite'], account: acc });
    return r.accessToken;
  } catch {
    await msalApp.acquireTokenRedirect({ scopes: ['Files.ReadWrite'], account: getMsalAccount() });
    throw new Error('Token-Redirect gestartet');
  }
}

async function loadFromGraph() {
  try {
    const token = await getToken();
    const resp  = await fetch(GRAPH_FILE, { headers: { Authorization: `Bearer ${token}` } });
    if (resp.status === 404) {
      await _putGraph(token);
      dismissBanner();
      setSaveStatus('☁️ OneDrive eingerichtet', '#a5d6a7');
      return;
    }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (!data.classes) throw new Error('Unbekanntes Format');
    Object.assign(state, data);
    saveLocal(); updateDropdown(); renderAll(); dismissBanner();
    const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    setSaveStatus('☁️ geladen ' + now, '#a5d6a7');
  } catch(e) {
    setSaveStatus('🔴 Fehler: ' + (e.message || ''), '#ef9a9a');
    console.error('loadFromGraph:', e);
  }
}

async function _putGraph(tokenArg) {
  const token = tokenArg || await getToken();
  const resp  = await fetch(GRAPH_FILE, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(state, null, 2)
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
}

async function writeToGraph() {
  if (!getMsalAccount()) return;
  try {
    await _putGraph();
    const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    setSaveStatus('☁️ gespeichert ' + now, '#a5d6a7');
  } catch(e) {
    setSaveStatus('🔴 Sync-Fehler', '#ef9a9a');
    console.error('writeToGraph:', e);
  }
}

function scheduleGraphSave() {
  clearTimeout(_graphTimer);
  setSaveStatus('⏳ ...', '#fff9c4');
  _graphTimer = setTimeout(writeToGraph, 1500);
}

// ══════════════════════════════════════════
// DATEI-VERKNÜPFUNG & AUTO-SPEICHERN (OneDrive-Workflow)
// ══════════════════════════════════════════
let _fileHandle = null;

function setSaveStatus(text, color) {
  const el = document.getElementById('save-status');
  if (el) { el.textContent = text; el.style.color = color || 'rgba(255,255,255,.5)'; }
}

// Bestehende Datendatei öffnen und verknüpfen
async function openDataFile() {
  if (!window.showOpenFilePicker) { alert('Dein Browser unterstützt diese Funktion nicht.\nBitte Edge oder Chrome verwenden.'); return; }
  try {
    const [h] = await window.showOpenFilePicker({
      types: [{description:'Klassenmanager Daten', accept:{'application/json':['.json']}}]
    });
    _fileHandle = h;
    const file  = await h.getFile();
    const data  = JSON.parse(await file.text());
    if (!data.classes) throw new Error('Ungültiges Dateiformat.');
    Object.assign(state, data);
    saveLocal(); updateDropdown(); renderAll();
    setSaveStatus('🟢 ' + file.name, '#a5d6a7');
    dismissBanner();
  } catch(e) {
    if (e.name !== 'AbortError') alert('Fehler: ' + e.message);
  }
}

// Neue Datendatei anlegen (direkt im OneDrive-Ordner)
async function createDataFile() {
  if (!window.showSaveFilePicker) { alert('Dein Browser unterstützt diese Funktion nicht.\nBitte Edge oder Chrome verwenden.'); return; }
  try {
    const h = await window.showSaveFilePicker({
      suggestedName: 'klassenmanager_data.json',
      types: [{description:'Klassenmanager Daten', accept:{'application/json':['.json']}}]
    });
    _fileHandle = h;
    await writeToHandle();
    setSaveStatus('🟢 Neue Datei angelegt', '#a5d6a7');
  } catch(e) {
    if (e.name !== 'AbortError') alert('Fehler: ' + e.message);
  }
}

async function writeToHandle() {
  if (!_fileHandle) return;
  try {
    const w = await _fileHandle.createWritable();
    await w.write(JSON.stringify(state, null, 2));
    await w.close();
    const now = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    setSaveStatus('🟢 gespeichert ' + now, '#a5d6a7');
  } catch(e) {
    setSaveStatus('🔴 Speichern fehlgeschlagen', '#ef9a9a');
  }
}

// ══════════════════════════════════════════
// EXCEL IMPORT
// ══════════════════════════════════════════
function triggerImport() { document.getElementById('file-in').click(); }

function handleFiles(ev) {
  Array.from(ev.target.files).forEach(processExcelFile);
  ev.target.value = '';
}

function processExcelFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});

      // Schüler-Blatt suchen
      const sName = wb.SheetNames.find(n => /schül|schul|kurs|name/i.test(n));
      const sSheet = wb.Sheets[sName || wb.SheetNames[1] || wb.SheetNames[0]];
      const schueler = [];
      if (sSheet) {
        XLSX.utils.sheet_to_json(sSheet, {header:1}).forEach((r,i) => {
          if (i === 0) return;
          const nn = String(r[0]||'').trim();
          if (nn) schueler.push({nachname:nn, vorname:String(r[1]||'').trim()});
        });
      }

      // Termine-Blatt suchen
      const tName  = wb.SheetNames.find(n => /termin|plan/i.test(n));
      const tSheet = wb.Sheets[tName];
      const termine = [];
      if (tSheet) {
        XLSX.utils.sheet_to_json(tSheet, {header:1, cellDates:true}).forEach((r,i) => {
          if (i === 0) return;
          let datum = null;
          if (r[0] instanceof Date) datum = r[0].toISOString().slice(0,10);
          else if (typeof r[0] === 'number') datum = new Date(Math.round((r[0]-25569)*86400*1000)).toISOString().slice(0,10);
          else if (r[0]) datum = String(r[0]).slice(0,10);
          if (datum && /^\d{4}-\d{2}-\d{2}$/.test(datum)) termine.push({datum, thema:String(r[1]||'').trim()});
        });
      }

      const suggestedName = file.name.replace(/[_\-]?\d{4}[_\-]\d{4}.*/i,'').replace(/Notenliste.*$/i,'').replace(/[_\-]/g,' ').trim() || 'Neue Klasse';
      window.__importData = {schueler, termine};
      showModal(`<h2>Excel importiert</h2>
        <div class="field"><label>Klassenname</label><input id="m-icn" value="${esc(suggestedName)}"></div>
        <p class="info-txt">Erkannt: ${schueler.length} Schüler · ${termine.length} Termine</p>
        ${(!schueler.length && !termine.length) ? '<p style="color:#c62828;font-size:12px">⚠ Keine Daten erkannt. Die Datei benötigt ein Blatt mit "Schüler" oder "Kursliste" und ggf. "Planung" oder "Termine".</p>' : ''}
        <div class="mbtns">
          <button class="btn btn-gray" onclick="closeModal()">Abbrechen</button>
          <button class="btn btn-blue" onclick="doImport()">Importieren</button>
        </div>`);
    } catch(err) { alert('Lesefehler: ' + err.message); }
  };
  reader.readAsBinaryString(file);
}

function doImport() {
  const name = document.getElementById('m-icn').value.trim(); if (!name) return;
  const {schueler, termine} = window.__importData || {schueler:[],termine:[]};
  const sortSch = [...schueler].sort((a,b)=>a.nachname.localeCompare(b.nachname,'de'));
  const sortTer = [...termine].sort((a,b)=>a.datum.localeCompare(b.datum));

  if (state.classes[name]) {
    if (!confirm(`Klasse "${name}" existiert. Neue Einträge ergänzen?`)) return;
    const k = state.classes[name];
    sortSch.forEach(s => { if (!k.schueler.some(x=>x.nachname===s.nachname&&x.vorname===s.vorname)) k.schueler.push(s); });
    sortTer.forEach(t => { if (!k.termine.some(x=>x.datum===t.datum)) k.termine.push(t); });
    k.schueler.sort((a,b)=>a.nachname.localeCompare(b.nachname,'de'));
    k.termine.sort((a,b)=>a.datum.localeCompare(b.datum));
    state.cur = name; save(); updateDropdown(); renderAll();
  } else {
    addNewClass(name, sortSch, sortTer);
  }
  closeModal();
}

// ══════════════════════════════════════════
// EXCEL EXPORT
// ══════════════════════════════════════════
function exportExcel() {
  const k = cls(); if (!k) { alert('Keine Klasse ausgewählt.'); return; }
  const wb     = XLSX.utils.book_new();
  const sorted = [...k.termine].sort((a,b)=>a.datum.localeCompare(b.datum));

  // Anwesenheit
  const anwHead = ['Name', ...sorted.map(t=>fmtDate(t.datum)+(t.thema?' – '+t.thema:'')), 'Fehltage'];
  const anwRows = k.schueler.map((s,si) => {
    let fehlt=0;
    const cells = sorted.map(t => {
      const st=(k.anwesenheit[si]||{})[t.datum];
      if(st==='E'||st==='Q'||st==='U')fehlt++;
      return {A:'Anwesend',E:'Entschuldigt',Q:'Offen (?)',U:'Unentschuldigt',F:'Ausfall'}[st]||'';
    });
    return [`${s.nachname}, ${s.vorname}`, ...cells, fehlt];
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([anwHead,...anwRows]), 'Anwesenheit');

  // Mündlich
  const muHead = ['Name', ...sorted.map(t=>fmtDate(t.datum)), 'Ø Note'];
  const muRows = k.schueler.map((s,si) => {
    const cells = sorted.map(t => { const r=(k.muendlich[si]||{})[t.datum]; return r!==undefined?SM_LABELS[r]:''; });
    const avg   = muendlichAvgGrade(si);
    return [`${s.nachname}, ${s.vorname}`, ...cells, avg!==null?avg.toFixed(1):''];
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([muHead,...muRows]), 'Mündliche Mitarbeit');

  // Notenübersicht
  const noHead = ['Name','Mündlich Ø', ...k.arbeiten.map(a=>a.name), 'Gesamtnote'];
  const noRows = k.schueler.map((s,si) => {
    const mA = muendlichAvgGrade(si);
    const aG = k.arbeiten.map(a => arbeitGrade(a,si));
    const vA = aG.filter(g=>g!==null);
    const aAvg = vA.length ? vA.reduce((a,b)=>a+b,0)/vA.length : null;
    const {m,a} = k.gewichtung;
    let fin = null;
    if(mA!==null&&aAvg!==null) fin=((mA*m+aAvg*a)/(m+a)).toFixed(1);
    else if(mA!==null) fin=mA.toFixed(1);
    else if(aAvg!==null) fin=aAvg.toFixed(1);
    return [`${s.nachname}, ${s.vorname}`, mA!==null?mA.toFixed(1):'', ...aG.map(g=>g||''), fin||''];
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([noHead,...noRows]), 'Notenübersicht');

  // Klassenarbeiten
  k.arbeiten.forEach(arb => {
    const maxT = arb.aufgaben.reduce((s,a)=>s+(parseFloat(a.punkte)||0),0);
    const head = ['Name', ...arb.aufgaben.map(a=>`${a.name} (${a.punkte}P)`), 'Gesamt', '%', 'Note'];
    const rows = k.schueler.map((s,si) => {
      const ergs  = arb.ergebnisse[si]||[];
      const earn  = ergs.reduce((s,p)=>s+(parseFloat(p)||0),0);
      const pct   = maxT ? (earn/maxT*100).toFixed(1) : '';
      return [`${s.nachname}, ${s.vorname}`, ...arb.aufgaben.map((_,oi)=>ergs[oi]!==undefined?ergs[oi]:''), `${earn}/${maxT}`, pct, arbeitGrade(arb,si)||''];
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([head,...rows]), arb.name.slice(0,31));
  });

  XLSX.writeFile(wb, `${k.name}_Klassenmanager_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ══════════════════════════════════════════
// TABS & HELPERS
// ══════════════════════════════════════════
function switchTab(btn) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
}

function fmtDate(iso) {
  if (!iso) return '';
  const [,m,d] = iso.split('-');
  return `${d}.${m}.`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
