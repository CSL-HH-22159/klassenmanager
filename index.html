<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Klassenmanager</title>
<script>
// Lokale Datei bevorzugen, CDN als Fallback
(function(){
  var s=document.createElement('script');
  s.src='xlsx.full.min.js';
  s.onerror=function(){
    var f=document.createElement('script');
    f.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    document.head.appendChild(f);
  };
  document.head.appendChild(s);
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2/lib/msal-browser.min.js"
        onerror="window._msalFailed=true"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.25)}
header h1{font-size:1.1rem;white-space:nowrap}
.spacer{flex:1}
select#cls-sel{padding:6px 10px;border:1px solid rgba(255,255,255,.4);border-radius:6px;background:rgba(255,255,255,.12);color:#fff;font-size:13px;cursor:pointer;min-width:110px}
select#cls-sel option{background:#1a237e}
.btn{padding:6px 13px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.85}.btn:active{transform:scale(.97)}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.35)}
.btn-white{background:#fff;color:#1a237e}
.btn-blue{background:#1e88e5;color:#fff}
.btn-green{background:#43a047;color:#fff}
.btn-red{background:#e53935;color:#fff}
.btn-gray{background:#e0e0e0;color:#333}
.btn-sm{padding:3px 8px;font-size:11px}

nav{background:#fff;border-bottom:2px solid #e8eaf6;display:flex;overflow-x:auto}
nav button{padding:11px 22px;border:none;background:none;cursor:pointer;font-size:13.5px;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;font-weight:500}
nav button.active{color:#1a237e;border-bottom-color:#1a237e}
nav button:hover:not(.active){background:#f5f5f5}

main{padding:16px 20px}
.tab-panel{display:none}.tab-panel.active{display:block}

.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar h3{font-size:15px;color:#1a237e;flex:1}

.tbl-wrap{overflow:auto;max-height:calc(100vh - 210px);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.12);border:1px solid #e0e0e0}
table{border-collapse:collapse;background:#fff;font-size:13px;min-width:100%}
th,td{border:1px solid #e8eaf6;padding:5px 7px;white-space:nowrap}
thead th{background:#e8eaf6;position:sticky;top:0;z-index:2;font-weight:600;text-align:center;color:#283593}
.col-name{position:sticky;left:0;z-index:1;background:#fff;min-width:155px}
thead .col-name{z-index:3}
tbody tr:hover td{background:#fafafa}
tbody tr:hover .col-name{background:#fafafa}

.cell-st{text-align:center;cursor:pointer;padding:2px}
.sbtn{display:inline-block;width:34px;padding:3px 0;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;line-height:1.4}
.s-none{background:#f5f5f5;color:#bbb}
.s-A{background:#c8e6c9;color:#1b5e20}
.s-E{background:#bbdefb;color:#0d47a1}
.s-Q{background:#fff9c4;color:#e65100}
.s-U{background:#ffcdd2;color:#b71c1c}
.s-F{background:#eeeeee;color:#9e9e9e;text-decoration:line-through}
.s-V{background:#ede7f6;color:#4527a0}

.popup{position:fixed;z-index:500;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px;box-shadow:0 6px 20px rgba(0,0,0,.18);display:flex;flex-direction:column;gap:4px;min-width:148px}
.popup button{text-align:left;padding:5px 10px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.popup button:hover{filter:brightness(.92)}

.cell-sm{text-align:center;padding:2px}
.smrow{display:flex;gap:2px;justify-content:center}
.sm{font-size:16px;cursor:pointer;padding:1px 2px;border-radius:4px;border:2px solid transparent;line-height:1;transition:transform .1s;user-select:none}
.sm:hover{transform:scale(1.3)}
.sm.on{border-color:#1a237e;background:#e8eaf620}

.g1{color:#1b5e20;font-weight:700}.g2{color:#388e3c;font-weight:600}
.g3{color:#f9a825;font-weight:600}.g4{color:#e65100;font-weight:600}
.g5{color:#c62828;font-weight:600}.g6{color:#880e4f;font-weight:700}

.arbeit-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:5px 14px;border-radius:20px;cursor:pointer;font-size:13px;border:1.5px solid #c5cae9;background:#fff;color:#3949ab}
.pill.active{background:#1a237e;color:#fff;border-color:#1a237e}
.pill:hover:not(.active){background:#e8eaf6}

.card{background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.1);border:1px solid #e8eaf6}
.ns-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12.5px;margin-bottom:12px;padding:8px 12px;background:#f5f7ff;border-radius:6px}
.ns-inp{width:42px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:2px 4px;font-size:12px}
.pts-inp{width:54px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:3px;font-size:12px}
.th-inp{width:52px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:2px;font-size:12px;font-weight:500}
.name-inp{border:1px solid transparent;border-radius:4px;padding:2px 4px;font-size:12.5px;background:transparent;font-family:inherit}
.name-inp:hover{border-color:#ddd}
.name-inp:focus{outline:none;border-color:#1a237e;background:#fff}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;align-items:center;justify-content:center}
#overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px 28px;width:430px;max-width:95vw;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal h2{font-size:1.05rem;margin-bottom:16px;color:#1a237e}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:500}
.field input,.field select{width:100%;padding:8px 10px;border:1.5px solid #e0e0e0;border-radius:6px;font-size:14px}
.field input:focus,.field select:focus{outline:none;border-color:#1a237e}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.info-txt{font-size:12px;color:#666;margin:-6px 0 10px}

.empty{text-align:center;padding:60px 20px;color:#bbb}
.empty h3{font-size:1.05rem;margin-bottom:6px}
</style>
</head>
<body>

<header>
  <h1>📚 Klassenmanager</h1>
  <select id="cls-sel" onchange="switchClass(this.value)">
    <option value="">– Klasse wählen –</option>
  </select>
  <button class="btn btn-ghost" onclick="openAddClassModal()">+ Klasse</button>
  <button class="btn btn-ghost" onclick="confirmDeleteClass()" title="Aktuelle Klasse löschen">🗑</button>
  <div class="spacer"></div>
  <button class="btn btn-ghost" onclick="triggerImport()" title="Schüler/Termine aus Excel importieren">📥 Excel Import</button>
  <button class="btn btn-white" onclick="exportExcel()" title="Alle Daten als Excel exportieren">📤 Excel Export</button>
  <span style="width:1px;background:rgba(255,255,255,.25);align-self:stretch;margin:0 2px"></span>
  <button id="ms-login-btn" class="btn btn-ghost" onclick="toggleMsLogin()" title="Mit Microsoft-Konto anmelden für automatischen OneDrive-Sync">☁️ Microsoft-Konto</button>
  <button class="btn btn-ghost" onclick="openDataFile()" title="Datendatei aus OneDrive-Ordner öffnen und verknüpfen (lokal)">📂 Datei laden</button>
  <button class="btn btn-ghost" onclick="createDataFile()" title="Neue Datendatei im OneDrive-Ordner anlegen (lokal)">🆕 Neue Datei</button>
  <span id="save-status" style="font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap">⚪ nicht verknüpft</span>
  <input type="file" id="file-in" accept=".xlsx,.xls" multiple style="display:none" onchange="handleFiles(event)">
</header>

<nav>
  <button class="active" data-tab="anwesenheit" onclick="switchTab(this)">Anwesenheit</button>
  <button data-tab="muendlich" onclick="switchTab(this)">Mitarbeit</button>
  <button data-tab="noten" onclick="switchTab(this)">Notenübersicht</button>
  <button data-tab="arbeiten" onclick="switchTab(this)">Klassenarbeiten</button>
  <button data-tab="gruppen" onclick="switchTab(this)">Gruppen</button>
</nav>

<div id="sync-banner" style="display:none;background:#fff8e1;border-bottom:1px solid #ffe082;padding:8px 20px;font-size:13px;color:#5d4037;display:flex;align-items:center;gap:12px">
  <span>🔄</span>
  <span id="sync-banner-text"></span>
  <button id="sync-banner-btn" onclick="openDataFile()" style="padding:4px 12px;border:1px solid #f9a825;border-radius:5px;background:#fff3e0;color:#e65100;cursor:pointer;font-size:12px;font-weight:600">📂 Jetzt laden</button>
  <button onclick="dismissBanner()" style="margin-left:auto;background:none;border:none;color:#999;cursor:pointer;font-size:16px" title="Schließen">×</button>
</div>

<main>
  <div id="tab-anwesenheit" class="tab-panel active">
    <div class="toolbar">
      <h3>Anwesenheit</h3>
      <button id="anw-selbtn" class="btn btn-gray" onclick="toggleAnwSelMode()">☑ Mehrfachauswahl</button>
      <button class="btn btn-blue" onclick="openAddSchuelerModal()">+ Schüler</button>
      <button class="btn btn-green" onclick="openAddTerminModal()">+ Termin</button>
    </div>
    <div id="anw-selbar" style="display:none;background:#e8eaf6;border-radius:6px;padding:6px 12px;margin-bottom:8px;align-items:center;gap:10px;font-size:12.5px">
      <span id="anw-selcount">0 ausgewählt</span>
      <button class="btn btn-sm btn-gray" onclick="selectAllAnwCells()">☑ Alle auswählen</button>
      <button class="btn btn-sm btn-blue" onclick="showBulkStatusPopup(event)">Status setzen</button>
      <button class="btn btn-sm" style="background:#eceff1;color:#546e7a" onclick="applyBulkStatus('F')" title="Auswahl als Unterrichtsausfall markieren">— Ausfall</button>
      <button class="btn btn-sm btn-gray" onclick="clearAnwSel()">Auswahl aufheben</button>
    </div>
    <div id="anw-wrap" class="tbl-wrap"></div>
  </div>

  <div id="tab-muendlich" class="tab-panel">
    <div class="toolbar">
      <h3>Mitarbeit (Mündlich &amp; Kursarbeit)</h3>
      <span id="mu-hint" style="font-size:12px;color:#888">Smiley anklicken = Note vergeben / erneut anklicken = löschen · oben Mündlich (M), unten Kursarbeit (K)</span>
    </div>
    <div id="mu-wrap" class="tbl-wrap"></div>
  </div>

  <div id="tab-noten" class="tab-panel">
    <div class="toolbar">
      <h3>Notenübersicht</h3>
      <button class="btn btn-gray" onclick="openGewichtungModal()">⚙ Gewichtung</button>
    </div>
    <div id="no-pills" class="arbeit-pills"></div>
    <div id="no-wrap" class="tbl-wrap"></div>
  </div>

  <div id="tab-arbeiten" class="tab-panel">
    <div class="toolbar">
      <h3>Klassenarbeiten</h3>
      <button class="btn btn-green" onclick="addArbeit()">+ Arbeit hinzufügen</button>
    </div>
    <div id="arbeit-pills" class="arbeit-pills"></div>
    <div id="arbeit-body"></div>
  </div>

  <div id="tab-gruppen" class="tab-panel">
    <div class="toolbar">
      <h3>Gruppenarbeitsgenerator</h3>
    </div>
    <div id="gr-wrap"></div>
  </div>
</main>

<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box"></div>
</div>

<script>
// ══════════════════════════════════════════
// KONSTANTEN
// ══════════════════════════════════════════
const SMILEYS   = ['🤬','😢','😞','😐','🙂','😄'];
const SM_LABELS = ['Ungenügend (6)','Mangelhaft (5)','Ausreichend (4)','Befriedigend (3)','Gut (2)','Sehr gut (1)'];
const SM_GRADES = [6, 5, 4, 3, 2, 1];
const SM_COLORS = ['#880e4f','#c62828','#e65100','#f9a825','#388e3c','#1b5e20'];

// Oberstufe (Klassen 11/12): Punkte 0–15
const OB_THRESHOLDS = [95,90,85,80,75,70,65,60,55,50,45,40,33,27,20]; // Punkte 15→1
const OB_SMILEY_PTS = [0, 2, 5, 8, 11, 14]; // Smiley-Index → Punkte (Oberstufe)
function isOberstufe(name) { return /^1[12]/i.test(name||''); }
function ptsToNoteStr(p) {
  const notes = ['6','5-','5','5+','4-','4','4+','3-','3','3+','2-','2','2+','1-','1','1+'];
  p = Math.max(0, Math.min(15, Math.round(p)));
  return notes[p];
}
function ptsColorCls(p) {
  p = Math.round(p);
  if (p >= 13) return 'g1'; if (p >= 10) return 'g2'; if (p >= 7) return 'g3';
  if (p >= 4) return 'g4'; if (p >= 1) return 'g5'; return 'g6';
}
function pctToPts(pct, ns) {
  const t = (Array.isArray(ns) && ns.length === 15) ? ns : OB_THRESHOLDS;
  for (let i = 0; i < t.length; i++) { if (pct >= t[i]) return 15 - i; }
  return 0;
}

const STATUS_CFG = {
  A: {label:'A',    title:'Anwesend',           cls:'s-A'},
  E: {label:'E',    title:'Entschuldigt',        cls:'s-E'},
  Q: {label:'?',    title:'Offen (nicht entsch.)',cls:'s-Q'},
  U: {label:'U',    title:'Unentschuldigt',      cls:'s-U'},
  F: {label:'—',    title:'Unterrichtsausfall',  cls:'s-F'},
  V: {label:'V',    title:'Verspätet',           cls:'s-V'},
  '': {label:'–',   title:'Nicht eingetragen',   cls:'s-none'},
};

// ══════════════════════════════════════════
// STATE & PERSISTENZ
// ══════════════════════════════════════════
let state = { classes: {}, cur: null, curArbeit: 0 };

// Anwesenheit: Mehrfachauswahl (nicht persistiert)
let anwSelMode = false;
let anwSel = new Set();

// Gruppen: aktuelle Würfelung (nicht persistiert)
let grState = { n: 4, datum: '', filterAbwesend: true };
let grGroups = null;

function loadState() {
  try { const s = localStorage.getItem('km_v3'); if (s) Object.assign(state, JSON.parse(s)); } catch(e) {}
  setSaveStatus('⚪ nicht verknüpft', 'rgba(255,255,255,.45)');
}

function showSyncBanner() {
  const banner = document.getElementById('sync-banner');
  const text   = document.getElementById('sync-banner-text');
  if (!banner || !text) return;
  const ts = localStorage.getItem('km_v3_ts');
  const hasData = Object.keys(state.classes).length > 0;
  if (hasData && ts) {
    const d = new Date(ts);
    const fmt = d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})
              + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    text.textContent = `Lokaler Stand vom ${fmt}. Auf anderem Gerät gearbeitet? → Mit Microsoft anmelden (empfohlen) oder Datei laden für den aktuellen OneDrive-Stand.`;
  } else if (!hasData) {
    text.textContent = 'Noch keine Daten. Mit Microsoft anmelden (empfohlen), neue Klasse anlegen oder Datendatei laden.';
  } else {
    text.textContent = 'Für OneDrive-Sync: Mit Microsoft anmelden (empfohlen) oder Datendatei laden.';
  }
  banner.style.display = 'flex';
}

function dismissBanner() {
  const b = document.getElementById('sync-banner');
  if (b) b.style.display = 'none';
}
function saveLocal() {
  try {
    localStorage.setItem('km_v3', JSON.stringify(state));
    localStorage.setItem('km_v3_ts', new Date().toISOString());
  } catch(e) {}
}
function save() {
  // Zeitstempel wandert mit den Daten (localStorage, Datei UND Cloud) – Grundlage für
  // die Warnung, wenn ein älterer Stand einen neueren überschreiben würde.
  state.savedAt = new Date().toISOString();
  saveLocal();
  if (getMsalAccount()) scheduleGraphSave();
  else writeToHandle();
}

function fmtTs(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})
       + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}
function cls() {
  const k = state.cur ? state.classes[state.cur] : null;
  if (k) {
    // Fehlende Unterfelder ergänzen (ältere/fremde JSON-Dateien), statt später zu crashen
    if (!Array.isArray(k.schueler)) k.schueler = [];
    if (!Array.isArray(k.termine))  k.termine  = [];
    if (!Array.isArray(k.arbeiten)) k.arbeiten = [];
    if (!k.anwesenheit) k.anwesenheit = {};
    if (!k.muendlich)   k.muendlich   = {};
    if (!k.kursarbeit)  k.kursarbeit  = {};
    if (!k.gewichtung)  k.gewichtung  = { m: 60, a: 40 };
    // Einmalige Korrektur: der alte Default stand fälschlich auf 40% Mitarbeit / 60% schriftlich –
    // richtig ist 60% Mitarbeit (mündlich + Kursarbeit) / 40% schriftlich. Nur unkorrigierte
    // Klassen mit exakt dem alten Default werden gedreht; danach nie wieder angefasst,
    // damit eine bewusste manuelle Einstellung erhalten bleibt.
    if (!k.gwKorrigiert) {
      if (k.gewichtung.m === 40 && k.gewichtung.a === 60) k.gewichtung = { m: 60, a: 40 };
      k.gwKorrigiert = true;
    }
    ensureSchuelerIds(k);
  }
  return k;
}

// Vergibt jedem Schüler eine stabile ID (statt Listenposition), damit Anwesenheit/Noten
// beim Umsortieren (z.B. nach Hinzufügen eines neuen Schülers) nicht verrutschen.
// Bestehende Schüler ohne ID bekommen ihre aktuelle Position als ID zugewiesen, wodurch
// alle bisherigen Zuordnungen unverändert erhalten bleiben.
function ensureSchuelerIds(k) {
  if (typeof k.nextSchuelerId !== 'number') k.nextSchuelerId = 0;
  const anyHasId = k.schueler.some(s => s.id !== undefined && s.id !== null);
  if (!anyHasId && k.schueler.length) {
    // Erstmalige Migration einer noch nicht umgestellten Klasse: aktuelle Position wird
    // zur ID, damit alle bisherigen (positionsbasierten) Zuordnungen erhalten bleiben.
    k.schueler.forEach((s, idx) => { s.id = String(idx); });
  } else {
    // Bereits migrierte Klasse: neue Schüler ohne ID bekommen eine frische, garantiert
    // eindeutige ID (niemals die aktuelle Position, da die mit bestehenden IDs kollidieren könnte).
    k.schueler.forEach(s => {
      if (s.id === undefined || s.id === null) s.id = String(k.nextSchuelerId++);
    });
  }
  k.schueler.forEach(s => {
    const n = parseInt(s.id, 10);
    if (!isNaN(n) && n >= k.nextSchuelerId) k.nextSchuelerId = n + 1;
  });
}

// ══════════════════════════════════════════
// KLASSEN-VERWALTUNG
// ══════════════════════════════════════════
function switchClass(name) {
  state.cur = name || null;
  state.curArbeit = 0;
  grGroups = null; grState.datum = '';
  anwSelMode = false; anwSel.clear();
  save(); updateDropdown(); renderAll();
}

function addNewClass(name, schueler, termine) {
  schueler = schueler || [];
  termine  = termine  || [];
  if (!name || state.classes[name]) return;
  state.classes[name] = {
    name, schueler, termine,
    anwesenheit: {},
    muendlich:   {},
    kursarbeit:  {},
    arbeiten:    [],
    gewichtung:  { m: 60, a: 40 },
    gwKorrigiert: true
  };
  state.cur = name;
  ensureSchuelerIds(state.classes[name]);
  save(); updateDropdown(); renderAll();
}

function updateDropdown() {
  const sel = document.getElementById('cls-sel');
  sel.innerHTML = '<option value="">– Klasse wählen –</option>';
  Object.keys(state.classes).sort().forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    if (n === state.cur) o.selected = true;
    sel.appendChild(o);
  });
}

function confirmDeleteClass() {
  const k = cls(); if (!k) return;
  if (!confirm(`Klasse "${k.name}" und alle Daten endgültig löschen?`)) return;
  delete state.classes[state.cur];
  state.cur = null;
  save(); updateDropdown(); renderAll();
}

// ══════════════════════════════════════════
// RENDER-DISPATCH
// ══════════════════════════════════════════
function renderAll() {
  const k = cls();
  renderAnwesenheit(k);
  renderMuendlich(k);
  renderNoten(k);
  renderArbeiten(k);
  renderGruppen(k);
}

function emptyHtml(msg, sub) {
  return `<div class="empty"><h3>${msg}</h3>${sub ? '<p>' + sub + '</p>' : ''}</div>`;
}

// ══════════════════════════════════════════
// ANWESENHEIT
// ══════════════════════════════════════════
function renderAnwesenheit(k) {
  const wrap = document.getElementById('anw-wrap');
  if (!k)              { wrap.innerHTML = emptyHtml('Keine Klasse gewählt'); return; }
  if (!k.schueler.length) { wrap.innerHTML = emptyHtml('Keine Schüler', 'Schüler über "+ Schüler" hinzufügen oder Excel importieren.'); return; }
  if (!k.termine.length) {
    let h = `<div style="padding:16px">
      <div style="background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#e65100">
        ⚠ Noch keine Unterrichtstermine – Tabelle erscheint sobald du einen Termin hinzufügst.
      </div>
      <table><thead><tr><th class="col-name">Name</th></tr></thead><tbody>`;
    k.schueler.forEach(s => {
      h += `<tr><td class="col-name" style="cursor:pointer" title="Klicken für Bearbeiten/Löschen" onclick="showSchuelerPopup(event,'${s.id}')">${esc(s.nachname)}, ${esc(s.vorname)}</td></tr>`;
    });
    h += `</tbody></table></div>`;
    wrap.innerHTML = h;
    return;
  }

  const sorted = [...k.termine].sort((a, b) => a.datum.localeCompare(b.datum));
  let h = '<table><thead><tr><th class="col-name">Name</th>';

  sorted.forEach(t => {
    let colSel = '';
    if (anwSelMode) {
      const all = k.schueler.length > 0 && k.schueler.every(s => anwSel.has(s.id + '|' + t.datum));
      colSel = `<input type="checkbox" ${all?'checked':''} title="Ganze Spalte auswählen" style="vertical-align:middle;margin-right:3px" onclick="event.stopPropagation();toggleAnwColumn('${t.datum}')">`;
    }
    h += `<th style="min-width:92px">
      <div>${colSel}${fmtDate(t.datum)}</div>
      <input class="name-inp" style="width:84px;font-weight:400;font-size:10.5px;text-align:center" value="${esc(t.thema)}" placeholder="Thema" title="Thema der Stunde" onchange="updateTerminThema('${t.datum}',this.value)">
      <button class="btn btn-sm" style="margin-top:2px;background:#ffebee;color:#c62828" onclick="confirmDeleteTermin('${t.datum}')" title="Termin löschen">×</button>
    </th>`;
  });
  h += '<th style="min-width:60px;text-align:center">Fehltage</th></tr></thead><tbody>';

  k.schueler.forEach(s => {
    h += `<tr><td class="col-name" style="cursor:pointer" title="Klicken für Bearbeiten/Löschen" onclick="showSchuelerPopup(event,'${s.id}')">${esc(s.nachname)}, ${esc(s.vorname)}</td>`;
    let fehlt = 0;
    sorted.forEach(t => {
      const st = (k.anwesenheit[s.id] || {})[t.datum] || '';
      if (st === 'E' || st === 'Q' || st === 'U') fehlt++;
      const cfg = STATUS_CFG[st] || STATUS_CFG[''];
      if (anwSelMode) {
        const checked = anwSel.has(s.id + '|' + t.datum);
        h += `<td class="cell-st" style="${checked?'background:#c5cae9':''}" onclick="toggleAnwCell('${s.id}','${t.datum}')">
          <input type="checkbox" ${checked?'checked':''} style="pointer-events:none;vertical-align:middle;margin-right:3px">
          <button class="sbtn ${cfg.cls}" title="${cfg.title}" style="pointer-events:none">${cfg.label}</button>
        </td>`;
      } else {
        h += `<td class="cell-st" onclick="showStatusPopup(event,'${s.id}','${t.datum}')">
          <button class="sbtn ${cfg.cls}" title="${cfg.title}">${cfg.label}</button>
        </td>`;
      }
    });
    const fc = fehlt > 5 ? '#c62828' : fehlt > 2 ? '#e65100' : '#555';
    h += `<td style="text-align:center;font-weight:600;color:${fc}">${fehlt}</td></tr>`;
  });

  // Summenzeile
  h += '<tr style="background:#f5f5f5;font-weight:600"><td class="col-name" style="background:#f5f5f5">∑ Klasse</td>';
  sorted.forEach(t => {
    const cnt = {A:0,E:0,Q:0,U:0,F:0,V:0};
    k.schueler.forEach(s => { const st=(k.anwesenheit[s.id]||{})[t.datum]; if(st)cnt[st]++; });
    h += `<td style="text-align:center;font-size:11px;line-height:1.8">
      <span style="color:#1b5e20">${cnt.A}×A</span> <span style="color:#0d47a1">${cnt.E}×E</span> <span style="color:#b71c1c">${cnt.U}×U</span>${cnt.V ? ` <span style="color:#4527a0">${cnt.V}×V</span>` : ''}
    </td>`;
  });
  h += '<td></td></tr></tbody></table>';
  wrap.innerHTML = h;
}

let _popup = null;
function showStatusPopup(ev, sid, datum) {
  ev.stopPropagation();
  closePopup();
  const p = document.createElement('div');
  p.className = 'popup';
  const r = ev.currentTarget.getBoundingClientRect();
  p.style.top  = Math.min(r.bottom + 4, window.innerHeight - 230) + 'px';
  p.style.left = Math.max(4, Math.min(r.left, window.innerWidth - 160)) + 'px';

  [
    {st:'A', label:'✓  Anwesend',          cls:'s-A'},
    {st:'E', label:'E  Entschuldigt',       cls:'s-E'},
    {st:'Q', label:'?  Offen',              cls:'s-Q'},
    {st:'U', label:'U  Unentschuldigt',     cls:'s-U'},
    {st:'V', label:'V  Verspätet',           cls:'s-V'},
    {st:'F', label:'—  Unterrichtsausfall', cls:'s-F'},
    {st:'',  label:'×  Leer',              cls:'s-none'},
  ].forEach(o => {
    const b = document.createElement('button');
    b.className = o.cls; b.textContent = o.label;
    b.onclick = ev2 => { ev2.stopPropagation(); setAnwesenheit(sid, datum, o.st); closePopup(); };
    p.appendChild(b);
  });

  document.body.appendChild(p);
  _popup = p;
  setTimeout(() => document.addEventListener('click', closePopup, {once:true}), 0);
}
function closePopup() { if (_popup) { _popup.remove(); _popup = null; } }

function setAnwesenheit(sid, datum, status) {
  const k = cls(); if (!k) return;
  if (!k.anwesenheit[sid]) k.anwesenheit[sid] = {};
  if (status === '') delete k.anwesenheit[sid][datum];
  else k.anwesenheit[sid][datum] = status;
  save(); renderAnwesenheit(k);
}

function toggleAnwSelMode() {
  anwSelMode = !anwSelMode;
  if (!anwSelMode) anwSel.clear();
  const btn = document.getElementById('anw-selbtn');
  if (btn) {
    btn.textContent = anwSelMode ? '✕ Auswahl beenden' : '☑ Mehrfachauswahl';
    btn.className = anwSelMode ? 'btn btn-blue' : 'btn btn-gray';
  }
  updateAnwSelBar();
  renderAnwesenheit(cls());
}

function toggleAnwCell(sid, datum) {
  const key = sid + '|' + datum;
  if (anwSel.has(key)) anwSel.delete(key); else anwSel.add(key);
  updateAnwSelBar();
  renderAnwesenheit(cls());
}

function clearAnwSel() {
  anwSel.clear();
  updateAnwSelBar();
  renderAnwesenheit(cls());
}

function updateAnwSelBar() {
  const bar = document.getElementById('anw-selbar');
  const cnt = document.getElementById('anw-selcount');
  if (!bar || !cnt) return;
  bar.style.display = anwSelMode ? 'flex' : 'none';
  cnt.textContent = anwSel.size + ' ausgewählt';
}

function showBulkStatusPopup(ev) {
  if (!anwSel.size) return;
  closePopup();
  const p = document.createElement('div');
  p.className = 'popup';
  const r = ev.currentTarget.getBoundingClientRect();
  p.style.top  = Math.min(r.bottom + 4, window.innerHeight - 230) + 'px';
  p.style.left = Math.max(4, Math.min(r.left, window.innerWidth - 160)) + 'px';

  [
    {st:'A', label:'✓  Anwesend',          cls:'s-A'},
    {st:'E', label:'E  Entschuldigt',       cls:'s-E'},
    {st:'Q', label:'?  Offen',              cls:'s-Q'},
    {st:'U', label:'U  Unentschuldigt',     cls:'s-U'},
    {st:'V', label:'V  Verspätet',           cls:'s-V'},
    {st:'F', label:'—  Unterrichtsausfall', cls:'s-F'},
    {st:'',  label:'×  Leer',              cls:'s-none'},
  ].forEach(o => {
    const b = document.createElement('button');
    b.className = o.cls; b.textContent = o.label;
    b.onclick = ev2 => { ev2.stopPropagation(); applyBulkStatus(o.st); closePopup(); };
    p.appendChild(b);
  });

  document.body.appendChild(p);
  _popup = p;
  setTimeout(() => document.addEventListener('click', closePopup, {once:true}), 0);
}

function applyBulkStatus(status) {
  const k = cls(); if (!k) return;
  anwSel.forEach(key => {
    const idx = key.indexOf('|');
    const sid = key.slice(0, idx);
    const datum = key.slice(idx + 1);
    if (!k.anwesenheit[sid]) k.anwesenheit[sid] = {};
    if (status === '') delete k.anwesenheit[sid][datum];
    else k.anwesenheit[sid][datum] = status;
  });
  anwSel.clear();
  save(); updateAnwSelBar(); renderAnwesenheit(k);
}

// Ganze Termin-Spalte an-/abwählen (im Mehrfachauswahl-Modus)
function toggleAnwColumn(datum) {
  const k = cls(); if (!k) return;
  const all = k.schueler.length > 0 && k.schueler.every(s => anwSel.has(s.id + '|' + datum));
  k.schueler.forEach(s => {
    const key = s.id + '|' + datum;
    if (all) anwSel.delete(key); else anwSel.add(key);
  });
  updateAnwSelBar(); renderAnwesenheit(k);
}

function selectAllAnwCells() {
  const k = cls(); if (!k) return;
  const total = k.schueler.length * k.termine.length;
  const allSelected = total > 0 && anwSel.size >= total;
  anwSel.clear();
  if (!allSelected) {
    k.schueler.forEach(s => k.termine.forEach(t => anwSel.add(s.id + '|' + t.datum)));
  }
  updateAnwSelBar(); renderAnwesenheit(k);
}

// Klick auf den Namen: kleines Menü mit Bearbeiten/Löschen
function showSchuelerPopup(ev, sid) {
  ev.stopPropagation();
  closePopup();
  const k = cls(); if (!k) return;

  const r = ev.currentTarget.getBoundingClientRect();

  const bDel = document.createElement('button');
  bDel.textContent = '🗑 Schüler löschen';
  bDel.style.background = '#ffebee'; bDel.style.color = '#c62828';

function openEditSchuelerModal(sid) {
  const k = cls(); if (!k) return;
  const s = k.schueler.find(x => x.id === sid); if (!s) return;
  showModal(`<h2>Namen bearbeiten</h2>
    <div class="field"><label>Nachname</label><input id="m-en" value="${esc(s.nachname)}" onkeydown="if(event.key==='Enter')document.getElementById('m-ev').focus()"></div>
    <div class="field"><label>Vorname</label><input id="m-ev" value="${esc(s.vorname)}" onkeydown="if(event.key==='Enter')doEditSchueler('${sid}')"></div>
    <div class="mbtns">
      <button class="btn btn-gray" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-blue" onclick="doEditSchueler('${sid}')">Speichern</button>
    </div>`);
}

function doEditSchueler(sid) {
  const k = cls(); if (!k) return;
  const s = k.schueler.find(x => x.id === sid); if (!s) return;
  const nn = document.getElementById('m-en').value.trim();
  const vn = document.getElementById('m-ev').value.trim();
  if (!nn) { alert('Der Nachname darf nicht leer sein.'); return; }
  s.nachname = nn;
  s.vorname  = vn;
  k.schueler.sort((a,b) => a.nachname.localeCompare(b.nachname,'de'));
  save(); renderAll(); closeModal();
}

function confirmDeleteSchueler(sid) {
  const k = cls(); if (!k) return;
  const si = k.schueler.findIndex(x => x.id === sid);
  if (si === -1) return;
  const s = k.schueler[si];
  if (!confirm(`"${s.vorname} ${s.nachname}" entfernen?`)) return;
  k.schueler.splice(si, 1);
  delete k.anwesenheit[sid];
  delete k.muendlich[sid];
  delete k.kursarbeit[sid];
  k.arbeiten.forEach(arb => { if (arb.ergebnisse) delete arb.ergebnisse[sid]; });
  anwSel.clear();
  save(); renderAll();
}

function updateTerminThema(datum, value) {
  const k = cls(); if (!k) return;
  const t = k.termine.find(x => x.datum === datum);
  if (!t) return;
  t.thema = value.trim();
  save(); renderAll();
}

function confirmDeleteTermin(datum) {
  const k = cls(); if (!k) return;
  const t = k.termine.find(x => x.datum === datum);
  if (!confirm(`Termin ${fmtDate(datum)} (${t && t.thema ? t.thema : 'ohne Thema'}) löschen?`)) return;
  k.termine = k.termine.filter(x => x.datum !== datum);
  k.schueler.forEach(s => {
    if (k.anwesenheit[s.id]) delete k.anwesenheit[s.id][datum];
    if (k.muendlich[s.id])   delete k.muendlich[s.id][datum];
    if (k.kursarbeit[s.id])  delete k.kursarbeit[s.id][datum];
  });
  anwSel.clear();
  save(); renderAll();
}

// MÜNDLICHE MITARBEIT
// ══════════════════════════════════════════
function renderMuendlich(k) {
  const wrap = document.getElementById('mu-wrap');
  if (!k)                 { wrap.innerHTML = emptyHtml('Keine Klasse gewählt'); return; }
  if (!k.schueler.length) { wrap.innerHTML = emptyHtml('Keine Schüler'); return; }
  if (!k.termine.length)  { wrap.innerHTML = emptyHtml('Keine Termine', 'Unterrichtstermine über "+ Termin" im Anwesenheit-Tab hinzufügen.'); return; }

  const ob = isOberstufe(k.name);
  const hint = document.getElementById('mu-hint');
  if (hint) hint.textContent = 'Smiley anklicken = Note vergeben / erneut anklicken = löschen · oben Mündlich (M), unten Kursarbeit (K)';

  const sorted = [...k.termine].sort((a,b) => a.datum.localeCompare(b.datum));
  let h = '<table><thead><tr><th class="col-name">Name</th>';
  sorted.forEach(t => {
    h += `<th style="min-width:150px"><div>${fmtDate(t.datum)}</div><div style="font-size:10px;font-weight:400;color:#5c6bc0">${esc(t.thema)}</div></th>`;
  });
  h += `<th style="min-width:80px;text-align:center">Ø ${ob ? 'Punkte' : 'Note'}</th></tr></thead><tbody>`;

  function smileyRow(cat, sid, datum, val) {
    let row = SMILEYS.map((em, idx) => {
      const on = ob ? val === OB_SMILEY_PTS[idx] : val === idx;
      return `<span class="sm ${on?'on':''}" title="${SM_LABELS[idx]}"
        style="${on ? `border-color:${SM_COLORS[idx]};background:${SM_COLORS[idx]}22` : ''}"
        onclick="toggleMitarbeit('${cat}','${sid}','${datum}',${idx})">${em}</span>`;
    }).join('');
    // Oberstufe: Punktwert aus der alten 0-15-Eingabe, der keinem Smiley entspricht -
    // ohne Badge sähe die Zelle leer aus, obwohl der Wert zählt.
    if (ob && val !== undefined && val !== null && !OB_SMILEY_PTS.includes(val)) {
      row += `<span class="${ptsColorCls(val)}" title="Punktwert aus alter Eingabe – zählt im Schnitt; Smiley-Klick überschreibt" style="font-size:10px;margin-left:3px">${val}P</span>`;
    }
    return row;
  }

  k.schueler.forEach(s => {
    h += `<tr><td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}</td>`;
    let sum = 0, cnt = 0;
    sorted.forEach(t => {
      const rm = (k.muendlich[s.id]  || {})[t.datum];
      const rk = (k.kursarbeit[s.id] || {})[t.datum];
      h += `<td class="cell-sm">
        <div style="display:flex;align-items:center;gap:3px">
          <span style="font-size:9px;color:#9fa8da;width:11px">M</span>
          <div class="smrow">${smileyRow('m', s.id, t.datum, rm)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:3px;margin-top:2px;border-top:1px dashed #eee;padding-top:2px">
          <span style="font-size:9px;color:#9fa8da;width:11px">K</span>
          <div class="smrow">${smileyRow('k', s.id, t.datum, rk)}</div>
        </div>
      </td>`;
      if (rm !== undefined && rm !== null) { sum += ob ? rm : SM_GRADES[rm]; cnt++; }
      if (rk !== undefined && rk !== null) { sum += ob ? rk : SM_GRADES[rk]; cnt++; }
    });
    if (cnt > 0) {
      const avg = sum / cnt;
      if (ob) {
        const p = Math.round(avg);
        h += `<td style="text-align:center"><span class="${ptsColorCls(p)}" style="font-size:1.1rem">${avg.toFixed(1)}<br><small style="font-size:10px">${ptsToNoteStr(p)}</small></span></td>`;
      } else {
        const gi = Math.min(6, Math.max(1, Math.round(avg)));
        h += `<td style="text-align:center"><span class="g${gi}" style="font-size:1.1rem">${avg.toFixed(1)}</span></td>`;
      }
    } else {
      h += '<td style="text-align:center;color:#bbb">—</td>';
    }
    h += '</tr>';
  });

  h += '</tbody></table>';
  wrap.innerHTML = h;
}

function toggleMitarbeit(cat, sid, datum, idx) {
  const k = cls(); if (!k) return;
  const obj = cat === 'k' ? k.kursarbeit : k.muendlich;
  if (!obj[sid]) obj[sid] = {};
  const ob = isOberstufe(k.name);
  const val = ob ? OB_SMILEY_PTS[idx] : idx;
  if (obj[sid][datum] === val) delete obj[sid][datum];
  else obj[sid][datum] = val;
  save(); renderMuendlich(k); renderNoten(k);
}

// NOTEN
// ══════════════════════════════════════════
// 2. Halbjahr beginnt am 1. Februar; Aug–Jan = 1. Halbjahr, Feb–Jul = 2. Halbjahr
function getHalbjahr(datum) {
  const m = parseInt((datum || '').slice(5, 7), 10);
  return (m >= 2 && m <= 7) ? 2 : 1;
}

// "Großzügige" Rundung wie im Hamburger Notenprogramm Divis: bei exaktem .5-Randwert
// gewinnt die bessere (niedrigere) Note.
function roundNoteGuenstig(v) {
  const fl = Math.floor(v);
  const r = (v - fl) <= 0.5 ? fl : fl + 1;
  return Math.min(6, Math.max(1, r));
}

function mitarbeitAvgGrade(sid, hj) {
  const k = cls(); if (!k) return null;
  const ob = isOberstufe(k.name);
  let mEntries = Object.entries(k.muendlich[sid] || {});
  let kEntries = Object.entries((k.kursarbeit || {})[sid] || {});
  if (hj) {
    mEntries = mEntries.filter(([d]) => getHalbjahr(d) === hj);
    kEntries = kEntries.filter(([d]) => getHalbjahr(d) === hj);
  }
  const all = [...mEntries.map(([,v])=>v), ...kEntries.map(([,v])=>v)];
  if (!all.length) return null;
  const vals = ob ? all : all.map(r => SM_GRADES[r]);
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}

function arbeitGrade(arb, sid) {
  const ergs = (arb.ergebnisse || {})[sid];
  if (!ergs || !ergs.some(e => e !== '' && e !== undefined && e !== null)) return null;
  const maxTotal = arb.aufgaben.reduce((s,a) => s+(parseFloat(a.punkte)||0), 0);
  if (!maxTotal) return null;
  const earned = ergs.reduce((s,p) => s+(parseFloat(p)||0), 0);
  const pct = earned / maxTotal * 100;
  const k = cls();
  if (isOberstufe(k ? k.name : '')) {
    return pctToPts(pct, arb.notenschluessel);
  }
  const ns = Array.isArray(arb.notenschluessel) ? arb.notenschluessel : [90,75,60,45,30];
  for (let i = 0; i < ns.length; i++) { if (pct >= ns[i]) return i + 1; }
  return 6;
}

// Note für ein Halbjahr (mG/aG-Gewichtung wie im Gewichtung-Dialog, gilt für beide Halbjahre gleich)
function hjNote(sid, hj) {
  const k = cls(); if (!k) return null;
  const mG = k.gewichtung.m, aG = k.gewichtung.a;
  const mAvg = mitarbeitAvgGrade(sid, hj);
  const arbHJ = k.arbeiten.filter(a => getHalbjahr(a.datum) === hj);
  const aGrades = arbHJ.map(a => arbeitGrade(a, sid)).filter(g => g !== null);
  const aAvg = aGrades.length ? aGrades.reduce((a,b)=>a+b,0)/aGrades.length : null;
  if (mAvg !== null && aAvg !== null) return (mAvg*mG + aAvg*aG) / (mG+aG);
  if (mAvg !== null) return mAvg;
  if (aAvg !== null) return aAvg;
  return null;
}

// Endjahresnote (nur Klasse 5–10): 50% HJ1 + 50% HJ2, als Dezimalwert (Rundung erfolgt erst bei der Anzeige)
function jahresnote(sid) {
  const hj1 = hjNote(sid, 1), hj2 = hjNote(sid, 2);
  if (hj1 === null && hj2 === null) return null;
  if (hj1 === null) return hj2;
  if (hj2 === null) return hj1;
  return (hj1 + hj2) / 2;
}

function fmtNoteG(g, ob) {
  if (g === null) return '<span style="color:#bbb">—</span>';
  if (ob) {
    const p = Math.round(g);
    return `<span class="${ptsColorCls(p)}">${g.toFixed(1)} <small>(${ptsToNoteStr(p)})</small></span>`;
  }
  return `<span class="g${Math.min(6,Math.max(1,Math.round(g)))}">${g.toFixed(1)}</span>`;
}

// Für "Endnote"-Zellen (Note HJ1/HJ2, Jahresnote): Dezimalwert + gerundete Zeugnisnote in Klammern
function fmtNoteFinal(g, ob) {
  if (g === null) return '<span style="color:#bbb">—</span>';
  if (ob) {
    const p = Math.round(g);
    return `<span class="${ptsColorCls(p)}">${g.toFixed(1)} <strong>(${ptsToNoteStr(p)})</strong></span>`;
  }
  const r = roundNoteGuenstig(g);
  return `<span class="g${r}">${g.toFixed(1)} <strong>(${r})</strong></span>`;
}

// 'hj1' | 'hj2' | 'jahr' – startet im Halbjahr, in dem wir uns laut Datum gerade befinden
let noteView = getHalbjahr(new Date().toISOString().slice(0,10)) === 2 ? 'hj2' : 'hj1';
function switchNoteView(id) { noteView = id; renderNoten(cls()); }

function renderNoten(k) {
  const pills = document.getElementById('no-pills');
  const wrap  = document.getElementById('no-wrap');
  if (!k)                 { pills.innerHTML = ''; wrap.innerHTML = emptyHtml('Keine Klasse gewählt'); return; }
  if (!k.schueler.length) { pills.innerHTML = ''; wrap.innerHTML = emptyHtml('Keine Schüler'); return; }

  const ob = isOberstufe(k.name);
  const views = ob
    ? [['hj1','1. Halbjahr'],['hj2','2. Halbjahr']]
    : [['hj1','1. Halbjahr'],['hj2','2. Halbjahr'],['jahr','Jahresnote']];
  if (!views.some(v => v[0] === noteView)) noteView = 'hj1';
  pills.innerHTML = views.map(([id,label]) =>
    `<span class="pill ${noteView===id?'active':''}" onclick="switchNoteView('${id}')">${label}</span>`
  ).join('');

  const mG = k.gewichtung.m, aG = k.gewichtung.a;
  let h;

  if (noteView === 'jahr') {
    h = `<table><thead><tr><th class="col-name">Name</th><th>Note 1. Halbjahr</th><th>Note 2. Halbjahr</th><th>Jahresnote</th></tr></thead><tbody>`;
    k.schueler.forEach(s => {
      const hj1 = hjNote(s.id, 1), hj2 = hjNote(s.id, 2), jn = jahresnote(s.id);
      h += `<tr>
        <td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}</td>
        <td style="text-align:center">${fmtNoteFinal(hj1, ob)}</td>
        <td style="text-align:center">${fmtNoteFinal(hj2, ob)}</td>
        <td style="text-align:center;font-size:1.05rem">${fmtNoteFinal(jn, ob)}</td>
      </tr>`;
    });
    h += '</tbody></table>';
  } else {
    const hj = noteView === 'hj2' ? 2 : 1;
    const arbHJ = k.arbeiten.filter(a => getHalbjahr(a.datum) === hj);
    h = `<table><thead><tr><th class="col-name">Name</th><th>Mitarbeit (${mG}%)</th>`;
    arbHJ.forEach(a => h += `<th>${esc(a.name)}</th>`);
    h += `<th>Note ${hj}. Halbjahr</th></tr></thead><tbody>`;

    k.schueler.forEach(s => {
      const mAvg = mitarbeitAvgGrade(s.id, hj);
      const aGrades = arbHJ.map(a => arbeitGrade(a, s.id));
      const final = hjNote(s.id, hj);
      h += `<tr>
        <td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}</td>
        <td style="text-align:center">${fmtNoteG(mAvg, ob)}</td>`;
      aGrades.forEach(g => h += `<td style="text-align:center">${fmtNoteG(g, ob)}</td>`);
      h += `<td style="text-align:center;font-size:1.05rem">${fmtNoteFinal(final, ob)}</td></tr>`;
    });
    h += '</tbody></table>';
  }

  wrap.innerHTML = h;
}

// ══════════════════════════════════════════
function addArbeit() {
  const k = cls(); if (!k) { alert('Bitte zuerst eine Klasse wählen.'); return; }
  const ob = isOberstufe(k.name);
  k.arbeiten.push({
    name: ob ? `Klausur ${k.arbeiten.length + 1}` : `Arbeit ${k.arbeiten.length + 1}`,
    datum: new Date().toISOString().slice(0,10),
    aufgaben: [{name:'A1', punkte:10}],
    ergebnisse: {},
    notenschluessel: ob ? [...OB_THRESHOLDS] : [90, 75, 60, 45, 30]
  });
  state.curArbeit = k.arbeiten.length - 1;
  save(); renderArbeiten(k); renderNoten(k);
}

function switchArbeitPill(idx) { state.curArbeit = idx; renderArbeiten(cls()); }

function renderArbeiten(k) {
  const pills = document.getElementById('arbeit-pills');
  const body  = document.getElementById('arbeit-body');
  if (!k || !k.schueler.length) {
    pills.innerHTML = '';
    body.innerHTML = emptyHtml('Keine Schüler', 'Füge zuerst Schüler hinzu.');
    return;
  }
  if (!k.arbeiten.length) {
    pills.innerHTML = '';
    body.innerHTML = emptyHtml('Noch keine Klassenarbeit', 'Klicke auf "+ Arbeit hinzufügen".');
    return;
  }

  pills.innerHTML = k.arbeiten.map((a,i) =>
    `<span class="pill ${i===state.curArbeit?'active':''}" onclick="switchArbeitPill(${i})">${esc(a.name)}</span>`
  ).join('');

  const ai  = Math.min(state.curArbeit, k.arbeiten.length - 1);
  const arb = k.arbeiten[ai];
  if (!arb) { body.innerHTML = ''; return; }

  const maxTotal = arb.aufgaben.reduce((s,a) => s+(parseFloat(a.punkte)||0), 0);
  const ob = isOberstufe(k.name);
  const expectedLen = ob ? 15 : 5;
  const ns = (Array.isArray(arb.notenschluessel) && arb.notenschluessel.length === expectedLen)
    ? arb.notenschluessel
    : ob ? [...OB_THRESHOLDS] : [90,75,60,45,30];

  let nsBar;
  if (ob) {
    nsBar = `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%">`
      + ns.map((th, i) => {
          const pts = 15 - i;
          return `<span class="${ptsColorCls(pts)}" style="display:flex;align-items:center;gap:2px;font-size:11px;white-space:nowrap">
            <b>${pts}</b>P ab<input class="ns-inp" type="number" min="0" max="100" value="${th}" onchange="updateNS(${ai},${i},this.value)">%
          </span>`;
        }).join('')
      + `</div>`;
  } else {
    nsBar = ns.map((th, i) =>
      `<span class="g${i+1}" style="display:flex;align-items:center;gap:3px">
        Note ${i+1} ab <input class="ns-inp" type="number" min="0" max="100" value="${th}"
          onchange="updateNS(${ai},${i},this.value)">%
      </span>`
    ).join('');
  }

  let h = `<div class="card">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <input value="${esc(arb.name)}" style="font-size:14px;font-weight:600;border:1.5px solid #e0e0e0;border-radius:6px;padding:5px 10px;width:160px"
        onchange="arbRename(${ai},this.value)">
      <input type="date" value="${arb.datum||''}" style="border:1.5px solid #e0e0e0;border-radius:6px;padding:5px 8px"
        onchange="arbSetDate(${ai},this.value)">
      <span style="color:#888;font-size:12px">Max: ${maxTotal} Punkte</span>
      <div style="flex:1"></div>
      <button class="btn btn-sm" style="background:#ffebee;color:#c62828" onclick="confirmDeleteArbeit(${ai})">🗑 Löschen</button>
    </div>
    <div class="ns-bar"><strong>Notenschlüssel:</strong>${nsBar}</div>
    <div class="tbl-wrap" style="max-height:calc(100vh - 345px)">
    <table><thead><tr><th class="col-name">Name</th>`;

  arb.aufgaben.forEach((auf, oi) => {
    h += `<th style="min-width:90px;text-align:center">
      <input class="th-inp" value="${esc(auf.name)}" onchange="arbAufgName(${ai},${oi},this.value)"><br>
      <input class="th-inp" type="number" value="${auf.punkte}" min="0" step="0.5"
        onchange="arbAufgPunkte(${ai},${oi},this.value)"> P
      <button onclick="confirmDeleteAufgabe(${ai},${oi})" style="border:none;background:none;color:#bbb;cursor:pointer" title="Aufgabe löschen">×</button>
    </th>`;
  });
  h += `<th style="text-align:center"><button onclick="addAufgabe(${ai})" class="btn btn-sm" style="background:#e8f5e9;color:#2e7d32">+ Aufg.</button></th>
    <th style="text-align:center">Gesamt</th>
    <th style="text-align:center">Note</th>
  </tr></thead><tbody>`;

  k.schueler.forEach(s => {
    const sid = s.id;
    if (!arb.ergebnisse[sid]) arb.ergebnisse[sid] = [];
    let earned = 0;
    h += `<tr><td class="col-name">${esc(s.nachname)}, ${esc(s.vorname)}</td>`;
    arb.aufgaben.forEach((auf, oi) => {
      const v = arb.ergebnisse[sid][oi] !== undefined ? arb.ergebnisse[sid][oi] : '';
      if (v !== '') earned += parseFloat(v) || 0;
      h += `<td style="text-align:center"><input class="pts-inp" type="number" value="${v}" min="0" max="${auf.punkte}" step="0.5"
        onchange="setErgebnis(${ai},'${sid}',${oi},this.value)" id="pts-${ai}-${sid}-${oi}"></td>`;
    });
    const pct = maxTotal ? (earned/maxTotal*100).toFixed(1) : '—';
    const g   = arbeitGrade(arb, sid);
    const gHtml = g !== null
      ? (ob ? `<span class="${ptsColorCls(g)}" style="font-size:1.1rem">${g}<br><small style="font-size:10px">${ptsToNoteStr(g)}</small></span>`
            : `<span class="g${g}" style="font-size:1.1rem">${g}</span>`)
      : '—';
    h += `<td></td>
      <td style="text-align:center;font-size:12px" id="tot-${ai}-${sid}">${earned}/${maxTotal}<br><span style="color:#888">${pct}%</span></td>
      <td style="text-align:center" id="grd-${ai}-${sid}">${gHtml}</td>
    </tr>`;
  });

  // Klassenschnitt
  const vGrades = k.schueler.map(s => arbeitGrade(arb,s.id)).filter(g=>g!==null);
  const avgG    = vGrades.length ? (vGrades.reduce((a,b)=>a+b,0)/vGrades.length).toFixed(1) : '—';
  h += `<tr style="background:#f5f5f5;font-weight:600"><td class="col-name" style="background:#f5f5f5">Ø Klasse</td>`;
  arb.aufgaben.forEach((auf,oi) => {
    const colAvg = k.schueler.reduce((_,s)=>{
      return _ + (parseFloat((arb.ergebnisse[s.id]||[])[oi])||0);
    },0) / k.schueler.length;
    h += `<td style="text-align:center;color:#555">${colAvg.toFixed(1)}</td>`;
  });
  const avgLabel = (ob && avgG !== '—') ? ` (${ptsToNoteStr(parseFloat(avgG))})` : '';
  h += `<td></td><td style="text-align:center"></td><td style="text-align:center">⌀ ${avgG}${avgLabel}</td></tr>`;
  h += '</tbody></table></div></div>';
  body.innerHTML = h;
}

function setErgebnis(ai, sid, oi, val) {
  const k = cls(); if (!k) return;
  const arb = k.arbeiten[ai];
  if (!arb.ergebnisse[sid]) arb.ergebnisse[sid] = [];
  arb.ergebnisse[sid][oi] = val === '' ? '' : parseFloat(val) || 0;
  save();
  // Nur Summen-Zelle und Noten-Zelle updaten
  const ergs = arb.ergebnisse[sid];
  const maxT  = arb.aufgaben.reduce((s,a)=>s+(parseFloat(a.punkte)||0),0);
  const earn  = ergs.reduce((s,p)=>s+(parseFloat(p)||0),0);
  const pct   = maxT ? (earn/maxT*100).toFixed(1) : '—';
  const g     = arbeitGrade(arb, sid);
  const tc = document.getElementById(`tot-${ai}-${sid}`);
  const gc = document.getElementById(`grd-${ai}-${sid}`);
  const ob2 = isOberstufe(k ? k.name : '');
  if (tc) tc.innerHTML = `${earn}/${maxT}<br><span style="color:#888">${pct}%</span>`;
  if (gc) gc.innerHTML = g !== null
    ? (ob2 ? `<span class="${ptsColorCls(g)}" style="font-size:1.1rem">${g}<br><small style="font-size:10px">${ptsToNoteStr(g)}</small></span>`
           : `<span class="g${g}" style="font-size:1.1rem">${g}</span>`)
    : '—';
  renderNoten(k);
}

function addAufgabe(ai) {
  const k = cls(); if (!k) return;
  const arb = k.arbeiten[ai];
  arb.aufgaben.push({name:`A${arb.aufgaben.length+1}`, punkte:10});
  save(); renderArbeiten(k);
}

function confirmDeleteAufgabe(ai, oi) {
  if (!confirm('Aufgabe löschen?')) return;
  const k = cls(); if (!k) return;
  k.arbeiten[ai].aufgaben.splice(oi, 1);
  Object.values(k.arbeiten[ai].ergebnisse).forEach(e => e.splice(oi, 1));
  save(); renderArbeiten(k);
}

function confirmDeleteArbeit(ai) {
  const k = cls(); if (!k) return;
  if (!confirm(`"${k.arbeiten[ai].name}" löschen?`)) return;
  k.arbeiten.splice(ai, 1);
  state.curArbeit = Math.max(0, ai - 1);
  save(); renderArbeiten(k); renderNoten(k);
}

function arbRename(ai, v)        { const k=cls();if(!k)return;k.arbeiten[ai].name=v;save();renderArbeiten(k);renderNoten(k); }
function arbSetDate(ai, v)       { const k=cls();if(!k)return;k.arbeiten[ai].datum=v;save();renderArbeiten(k);renderNoten(k); }
function arbAufgName(ai,oi,v)    { const k=cls();if(!k)return;k.arbeiten[ai].aufgaben[oi].name=v;save(); }
function arbAufgPunkte(ai,oi,v)  { const k=cls();if(!k)return;k.arbeiten[ai].aufgaben[oi].punkte=parseFloat(v)||0;save();renderArbeiten(k);renderNoten(k); }
function updateNS(ai, idx, v) {
  const k=cls();if(!k)return;
  const arb=k.arbeiten[ai];
  const ob=isOberstufe(k.name);
  if(!Array.isArray(arb.notenschluessel)||arb.notenschluessel.length!==(ob?15:5))
    arb.notenschluessel = ob ? [...OB_THRESHOLDS] : [90,75,60,45,30];
  arb.notenschluessel[idx]=parseFloat(v)||0;
  save();renderArbeiten(k);renderNoten(k);
}

// GRUPPENARBEITSGENERATOR
// ══════════════════════════════════════════
function renderGruppen(k) {
  const wrap = document.getElementById('gr-wrap');
  if (!k)                 { wrap.innerHTML = emptyHtml('Keine Klasse gewählt'); return; }
  if (!k.schueler.length) { wrap.innerHTML = emptyHtml('Keine Schüler'); return; }

  const sorted = [...k.termine].sort((a,b) => a.datum.localeCompare(b.datum));
  if (!grState.datum && sorted.length) grState.datum = sorted[sorted.length - 1].datum;

  let excludedCount = 0;
  let poolSize = k.schueler.length;
  if (grState.filterAbwesend && grState.datum) {
    poolSize = 0;
    k.schueler.forEach(s => {
      const st = (k.anwesenheit[s.id] || {})[grState.datum] || '';
      const abwesend = st === 'E' || st === 'Q' || st === 'U';
      if (abwesend) excludedCount++; else poolSize++;
    });
  }

  const terminOpts = sorted.map(t =>
    `<option value="${t.datum}" ${t.datum===grState.datum?'selected':''}>${fmtDate(t.datum)}${t.thema?' – '+esc(t.thema):''}</option>`
  ).join('');

  let h = `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      <label style="font-size:12.5px;color:#555">Anzahl Gruppen
        <input type="number" min="2" max="${Math.max(2,k.schueler.length)}" value="${grState.n}" class="ns-inp" style="width:50px;margin-left:5px" onchange="grSetN(this.value)">
      </label>
      <label style="font-size:12.5px;color:#555">
        <input type="checkbox" ${grState.filterAbwesend?'checked':''} onchange="grSetFilter(this.checked)">
        Fehlende ausschließen (Stand:
        <select style="font-size:12px;padding:2px 4px" onchange="grSetDatum(this.value)" ${!sorted.length?'disabled':''}>
          ${sorted.length ? terminOpts : '<option>– keine Termine –</option>'}
        </select>)
      </label>
      <button class="btn btn-blue" onclick="wuerfelGruppen()">🔀 Gruppen würfeln</button>
      <span style="font-size:12px;color:#888">${poolSize} von ${k.schueler.length} Schüler${(grState.filterAbwesend && grState.datum) ? ` berücksichtigt (${excludedCount} fehlend ausgeschlossen)` : ''}</span>
    </div>
  </div>`;

  if (!grGroups || !grGroups.length) {
    h += emptyHtml('Noch keine Gruppen gewürfelt', 'Klicke auf "🔀 Gruppen würfeln".');
    wrap.innerHTML = h;
    return;
  }

  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px">';
  grGroups.forEach((g, gi) => {
    h += `<div class="card">
      <h4 style="color:#1a237e;font-size:13.5px;margin-bottom:8px">Gruppe ${gi+1}</h4>
      <ul style="list-style:none;display:flex;flex-direction:column;gap:5px">`;
    g.forEach(sid => {
      const s = k.schueler.find(x => x.id === sid);
      if (!s) return;
      const isSprecher = g.sprecher === sid;
      h += `<li style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 6px;border-radius:5px;${isSprecher?'background:#e8eaf6':''}"
        onclick="setSprecher(${gi},'${sid}')" title="Als Sprecher markieren">
        <span style="font-size:13px">${isSprecher?'🗣':'•'}</span>
        <span style="font-size:13px${isSprecher?';font-weight:700;color:#1a237e':''}">${esc(s.nachname)}, ${esc(s.vorname)}</span>
      </li>`;
    });
    h += `</ul></div>`;
  });
  h += '</div>';
  wrap.innerHTML = h;
}

function grSetN(v) { grState.n = Math.max(2, parseInt(v) || 2); }
function grSetFilter(v) { grState.filterAbwesend = v; renderGruppen(cls()); }
function grSetDatum(v) { grState.datum = v; renderGruppen(cls()); }

function wuerfelGruppen() {
  const k = cls(); if (!k) return;
  let pool = k.schueler.map(s => s.id);
  if (grState.filterAbwesend && grState.datum) {
    pool = pool.filter(sid => {
      const st = (k.anwesenheit[sid] || {})[grState.datum] || '';
      return !(st === 'E' || st === 'Q' || st === 'U');
    });
  }
  if (pool.length < 2) { alert('Zu wenige verfügbare Schüler für eine Gruppeneinteilung.'); return; }
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  const n = Math.min(grState.n, pool.length);
  const groups = Array.from({length: n}, () => []);
  pool.forEach((sid, idx) => groups[idx % n].push(sid));
  groups.forEach(g => { g.sprecher = g[Math.floor(Math.random() * g.length)]; });
  grGroups = groups;
  renderGruppen(k);
}

function setSprecher(gi, sid) {
  if (!grGroups || !grGroups[gi]) return;
  grGroups[gi].sprecher = sid;
  renderGruppen(cls());
}

function showModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => { const f = document.querySelector('#modal-box input'); if(f) f.focus(); }, 60);
}
function closeModal() { document.getElementById('overlay').classList.remove('show'); }

function openAddClassModal() {
  showModal(`<h2>Neue Klasse anlegen</h2>
    <div class="field"><label>Klassenname</label><input id="m-cn" placeholder="z. B. 10b" onkeydown="if(event.key==='Enter')doAddClass()"></div>
    <div class="mbtns">
      <button class="btn btn-gray" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-blue" onclick="doAddClass()">Erstellen</button>
    </div>`);
}
function doAddClass() {
  const n = document.getElementById('m-cn').value.trim(); if (!n) return;
  if (state.classes[n]) { alert(`Klasse "${n}" existiert bereits.`); return; }
  addNewClass(n); closeModal();
}

function openAddSchuelerModal() {
  if (!cls()) { alert('Bitte zuerst eine Klasse wählen.'); return; }
  showModal(`<h2>Schüler hinzufügen</h2>
    <div class="field"><label>Nachname</label><input id="m-nn" placeholder="Mustermann" onkeydown="if(event.key==='Enter')document.getElementById('m-vn').focus()"></div>
    <div class="field"><label>Vorname</label><input id="m-vn" placeholder="Max" onkeydown="if(event.key==='Enter')doAddSchuelerMore()"></div>
    <div class="mbtns">
      <button class="btn btn-gray" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-gray" onclick="doAddSchuelerMore()">+ Weiterer</button>
      <button class="btn btn-blue" onclick="doAddSchueler()">Hinzufügen</button>
    </div>`);
}
function doAddSchueler(more) {
  const k = cls(); if (!k) return;
  const nn = document.getElementById('m-nn').value.trim(); if (!nn) return;
  const vn = document.getElementById('m-vn').value.trim();
  k.schueler.push({nachname:nn, vorname:vn});
  k.schueler.sort((a,b) => a.nachname.localeCompare(b.nachname,'de'));
  save(); renderAll();
  if (more) { document.getElementById('m-nn').value=''; document.getElementById('m-vn').value=''; document.getElementById('m-nn').focus(); }
  else closeModal();
}
function doAddSchuelerMore() { doAddSchueler(true); }

function openAddTerminModal() {
  if (!cls()) { alert('Bitte zuerst eine Klasse wählen.'); return; }
  const today = new Date().toISOString().slice(0,10);
  showModal(`<h2>Termin hinzufügen</h2>
    <div class="field"><label>Datum</label><input type="date" id="m-dat" value="${today}" onkeydown="if(event.key==='Enter')document.getElementById('m-thm').focus()"></div>
    <div class="field"><label>Thema (optional)</label><input id="m-thm" placeholder="z. B. Plattentektonik" onkeydown="if(event.key==='Enter')doAddTerminMore()"></div>
    <div class="mbtns">
      <button class="btn btn-gray" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-gray" onclick="doAddTerminMore()">+ Weiterer (+7 Tage)</button>
      <button class="btn btn-green" onclick="doAddTermin()">Hinzufügen</button>
    </div>`);
}
function doAddTermin(more) {
  const k = cls(); if (!k) return;
  const dat = document.getElementById('m-dat').value; if (!dat) return;
  if (k.termine.some(t => t.datum === dat)) { alert('Dieser Termin existiert bereits.'); return; }
  const thm = document.getElementById('m-thm').value.trim();
  k.termine.push({datum:dat, thema:thm});
  k.termine.sort((a,b) => a.datum.localeCompare(b.datum));
  save(); renderAll();

const MS_CLIENT_ID = '3e2c3604-c31d-465d-bed4-777eff1e0b34';
const MS_TENANT_ID = '1ec883c9-e58e-4a81-a220-9f26696a86fd';
const GRAPH_FILE   = 'https://graph.microsoft.com/v1.0/me/drive/root:/Schule/Schuljahr 2026_2027/klassenmanager_data.json:/content';
// Metadaten-URL derselben Datei (ohne :/content) – liefert das eTag für den Konfliktschutz
const GRAPH_ITEM   = 'https://graph.microsoft.com/v1.0/me/drive/root:/Schule/Schuljahr 2026_2027/klassenmanager_data.json';
// Tages-Backup: eine Datei pro Wochentag = automatische 7-Tage-Rotation ohne Aufräum-Logik

let msalApp = null;
let _graphTimer = null;
// eTag der zuletzt gesehenen Cloud-Datei. Beim Speichern per If-Match mitgeschickt:
// hat ein anderes Gerät zwischenzeitlich gespeichert, lehnt OneDrive mit 412 ab,
// statt dass wir dessen Stand stumm überschreiben.
let _graphETag = null;

function initMsal() {
  if (typeof msal === 'undefined' || window._msalFailed) {
    const btn = document.getElementById('ms-login-btn');

function getMsalAccount() {
  if (!msalApp) return null;

async function toggleMsLogin() {
  if (!msalApp || window.location.protocol !== 'https:') {

    if (_graphTimer) {

let _lastToken = null; // zuletzt erfolgreiches Token, für den Not-Save beim Schließen des Tabs

async function getToken() {
  const acc = getMsalAccount();
  if (!acc) throw new Error('Nicht angemeldet');
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: ['Files.ReadWrite'], account: acc });
    _lastToken = r.accessToken;
    return r.accessToken;
  } catch {
    await msalApp.acquireTokenRedirect({ scopes: ['Files.ReadWrite'], account: getMsalAccount() });
    throw new Error('Token-Redirect gestartet');
  }
}

// Der Cloud-Save ist um 1,5 s verzögert - wird der Tab in diesem Fenster geschlossen,
// ginge die letzte Änderung in OneDrive verloren. keepalive-Fetch feuert sie noch ab.
window.addEventListener('pagehide', () => {
  if (_graphTimer && _lastToken) {
    clearTimeout(_graphTimer);
    _graphTimer = null;
    try {
      const headers = { Authorization: `Bearer ${_lastToken}`, 'Content-Type': 'application/json' };
      // If-Match auch hier: hat ein anderes Gerät inzwischen gespeichert, schlägt der
      // Not-Save lieber fehl (localStorage hat die Änderung; der Zeitstempel-Schutz
      // beim nächsten Laden meldet die Abweichung), statt fremde Daten zu überschreiben.
      if (_graphETag) headers['If-Match'] = _graphETag;
      fetch(GRAPH_FILE, { method: 'PUT', keepalive: true, headers, body: JSON.stringify(state) });
    } catch(e) {}
  }
});

async function loadFromGraph() {
  try {
    const token = await getToken();
    // Erst Metadaten holen: liefert das eTag für den If-Match-Konfliktschutz beim Speichern
    const meta = await fetch(GRAPH_ITEM + '?$select=eTag', { headers: { Authorization: `Bearer ${token}` } });
    if (meta.status === 404) {
      await _putGraph(token, true);
      dismissBanner();
      setSaveStatus('☁️ OneDrive eingerichtet', '#a5d6a7');
      return;
    }
    if (meta.ok) { try { _graphETag = (await meta.json()).eTag || null; } catch(e) { _graphETag = null; } }
    const resp = await fetch(GRAPH_FILE, { headers: { Authorization: `Bearer ${token}` } });
    if (resp.status === 404) {
      await _putGraph(token, true);
      dismissBanner();
      setSaveStatus('☁️ OneDrive eingerichtet', '#a5d6a7');
      return;
    }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (!data.classes) throw new Error('Unbekanntes Format');
    // Schutz vor Datenverlust: Cloud-Stand ist älter als der lokale Stand
    // (z.B. Änderungen vor dem Login gemacht) -> nachfragen statt stumm überschreiben.
    if (data.savedAt && state.savedAt && data.savedAt < state.savedAt) {
      const laden = confirm(
        `⚠ Der OneDrive-Stand (${fmtTs(data.savedAt)}) ist ÄLTER als der Stand auf diesem Gerät (${fmtTs(state.savedAt)}).\n\n` +
        `OK = älteren OneDrive-Stand laden (Änderungen auf diesem Gerät gehen verloren)\n` +
        `Abbrechen = Stand dieses Geräts behalten und in OneDrive hochladen`);
      if (!laden) {
        await _putGraph(token);
        dismissBanner();
        setSaveStatus('☁️ lokaler Stand hochgeladen', '#a5d6a7');
        return;
      }
    }
    Object.assign(state, data);
    saveLocal(); updateDropdown(); renderAll(); dismissBanner();
    const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    setSaveStatus('☁️ geladen ' + now, '#a5d6a7');
  } catch(e) {
    setSaveStatus('🔴 Fehler: ' + (e.message || ''), '#ef9a9a');
    console.error('loadFromGraph:', e);
  }
}

// force=true überspringt den If-Match-Schutz (Erstanlage bzw. bewusstes Überschreiben)
async function _putGraph(tokenArg, force) {
  const token = tokenArg || await getToken();
  const headers = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };
  if (_graphETag && !force) headers['If-Match'] = _graphETag;
  const resp = await fetch(GRAPH_FILE, {
    method: 'PUT',
    headers,
    body: JSON.stringify(state, null, 2)
  });
  if (resp.status === 412) { const err = new Error('Konflikt'); err.code = 412; throw err; }
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  // Neues eTag aus der Antwort übernehmen, damit der nächste Save wieder geschützt ist
  try { const item = await resp.json(); if (item && item.eTag) _graphETag = item.eTag; } catch(e) {}
}

async function writeToGraph() {
  if (!getMsalAccount()) return;
  try {
    await _putGraph();
    const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    setSaveStatus('☁️ gespeichert ' + now, '#a5d6a7');
    dailyBackup();
  } catch(e) {
    if (e.code === 412) { await handleGraphConflict(); return; }
    setSaveStatus('🔴 Sync-Fehler', '#ef9a9a');
    console.error('writeToGraph:', e);
  }
}

// OneDrive hat den Save abgelehnt: ein anderes Gerät hat seit unserem letzten Laden
// gespeichert. Nutzer entscheidet, welcher Stand gewinnt - nichts wird stumm überschrieben.
async function handleGraphConflict() {
  try {
    const token = await getToken();
    const resp = await fetch(GRAPH_FILE, { headers: { Authorization: `Bearer ${token}` } });
    const remote = resp.ok ? await resp.json() : null;
    const remoteTs = remote && remote.savedAt ? fmtTs(remote.savedAt) : 'unbekannt';
    const uebernehmen = confirm(
      `⚠ Konflikt: Die OneDrive-Daten wurden zwischenzeitlich von einem anderen Gerät geändert (Stand: ${remoteTs}).\n\n` +
      `OK = Stand des anderen Geräts laden (die letzte Änderung hier geht verloren)\n` +
      `Abbrechen = eigenen Stand durchsetzen (überschreibt den Stand des anderen Geräts)`);
    if (uebernehmen && remote && remote.classes) {
      const meta = await fetch(GRAPH_ITEM + '?$select=eTag', { headers: { Authorization: `Bearer ${token}` } });
      if (meta.ok) { try { _graphETag = (await meta.json()).eTag || null; } catch(e) {} }
      Object.assign(state, remote);
      saveLocal(); updateDropdown(); renderAll();
      setSaveStatus('☁️ Stand vom anderen Gerät geladen', '#a5d6a7');
    } else {
      await _putGraph(token, true);
      const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      setSaveStatus('☁️ gespeichert (überschrieben) ' + now, '#a5d6a7');
    }
  } catch(e) {
    setSaveStatus('🔴 Sync-Konflikt ungelöst', '#ef9a9a');
    console.error('handleGraphConflict:', e);
  }
}

// Einmal pro Tag zusätzlich eine Backup-Datei schreiben (pro Wochentag eine ->

function triggerImport() { document.getElementById('file-in').click(); }

function handleFiles(ev) {
  Array.from(ev.target.files).forEach(processExcelFile);
  ev.target.value = '';
}

// Wandelt eine Excel-Zelle in ein ISO-Datum (YYYY-MM-DD) um, oder null wenn nicht erkennbar.
// Deckt echte Excel-Datumsfelder, Excel-Seriennummern UND als Text getipptes TT.MM.JJJJ ab
// (letzteres wird sonst stillschweigend übersprungen, wenn die Spalte nicht als Datum formatiert ist).
function parseExcelDatum(raw) {
  if (raw instanceof Date) {
    return isNaN(raw.getTime()) ? null : raw.toISOString().slice(0,10);
  }
  if (typeof raw === 'number') {
    const d = new Date(Math.round((raw-25569)*86400*1000));
    return isNaN(d.getTime()) ? null : d.toISOString().slice(0,10);
  }
  if (raw) {
    const s = String(raw).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
    if (m) {
      let [, day, mon, yr] = m;
      if (yr.length === 2) yr = (parseInt(yr,10) < 70 ? '20' : '19') + yr;
      const iso = `${yr.padStart(4,'0')}-${mon.padStart(2,'0')}-${day.padStart(2,'0')}`;
      const check = new Date(iso);
      if (!isNaN(check.getTime())) return iso;
    }
  }
  return null;
}

function processExcelFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});

      // Schüler-Blatt suchen
      const sName = wb.SheetNames.find(n => /schül|schul|kurs|name/i.test(n));
      const sSheet = wb.Sheets[sName || wb.SheetNames[1] || wb.SheetNames[0]];
      const schueler = [];
      if (sSheet) {
        XLSX.utils.sheet_to_json(sSheet, {header:1}).forEach((r,i) => {
          if (i === 0) return;
          const nn = String(r[0]||'').trim();
          if (nn) schueler.push({nachname:nn, vorname:String(r[1]||'').trim()});
        });
      }

      // Termine-Blatt suchen
      const tName  = wb.SheetNames.find(n => /termin|plan/i.test(n));
      const tSheet = wb.Sheets[tName];
      const termine = [];
      let unparsedDates = 0;
      if (tSheet) {
        XLSX.utils.sheet_to_json(tSheet, {header:1, cellDates:true}).forEach((r,i) => {
          if (i === 0) return;
          if (r[0] === undefined || r[0] === null || r[0] === '') return; // leere Zeile
          const datum = parseExcelDatum(r[0]);
          if (datum) termine.push({datum, thema:String(r[1]||'').trim()});
          else unparsedDates++;
        });
      }

      const suggestedName = file.name.replace(/[_\-]?\d{4}[_\-]\d{4}.*/i,'').replace(/Notenliste.*$/i,'').replace(/[_\-]/g,' ').trim() || 'Neue Klasse';
      window.__importData = {schueler, termine};
      showModal(`<h2>Excel importiert</h2>
        <div class="field"><label>Klassenname</label><input id="m-icn" value="${esc(suggestedName)}"></div>
        <p class="info-txt">Erkannt: ${schueler.length} Schüler · ${termine.length} Termine</p>
        ${unparsedDates ? `<p style="color:#e65100;font-size:12px">⚠ ${unparsedDates} Zeile${unparsedDates>1?'n':''} in der Planung hatte${unparsedDates>1?'n':''} ein nicht erkennbares Datum und wurde${unparsedDates>1?'n':''} nicht importiert. Bitte die Datumsspalte in Excel als Datum formatieren.</p>` : ''}
        ${(!schueler.length && !termine.length) ? '<p style="color:#c62828;font-size:12px">⚠ Keine Daten erkannt. Die Datei benötigt ein Blatt mit "Schüler" oder "Kursliste" und ggf. "Planung" oder "Termine".</p>' : ''}
        <div class="mbtns">
          <button class="btn btn-gray" onclick="closeModal()">Abbrechen</button>
          <button class="btn btn-blue" onclick="doImport()">Importieren</button>
        </div>`);
    } catch(err) { alert('Lesefehler: ' + err.message); }
  };
  reader.readAsBinaryString(file);
}

function doImport() {
  const name = document.getElementById('m-icn').value.trim(); if (!name) return;
  const {schueler, termine} = window.__importData || {schueler:[],termine:[]};
  const sortSch = [...schueler].sort((a,b)=>a.nachname.localeCompare(b.nachname,'de'));
  const sortTer = [...termine].sort((a,b)=>a.datum.localeCompare(b.datum));

  if (state.classes[name]) {
    if (!confirm(`Klasse "${name}" existiert. Neue Einträge ergänzen?`)) return;
    const k = state.classes[name];
    sortSch.forEach(s => { if (!k.schueler.some(x=>x.nachname===s.nachname&&x.vorname===s.vorname)) k.schueler.push(s); });
    sortTer.forEach(t => { if (!k.termine.some(x=>x.datum===t.datum)) k.termine.push(t); });
    k.schueler.sort((a,b)=>a.nachname.localeCompare(b.nachname,'de'));
    k.termine.sort((a,b)=>a.datum.localeCompare(b.datum));
    state.cur = name;
    ensureSchuelerIds(k);
    save(); updateDropdown(); renderAll();
  } else {
    addNewClass(name, sortSch, sortTer);
  }
  closeModal();
}

// ══════════════════════════════════════════
// Liefert einen für das Workbook eindeutigen Excel-Blattnamen (max. 31 Zeichen).
// Excel erlaubt keine doppelten Blattnamen - ohne diese Prüfung stürzt der Export ab,
// sobald z.B. zwei Klassenarbeiten gleich (oder nach Kürzung gleich) heißen.
function uniqueSheetName(wb, name) {
  let base = String(name || 'Blatt').replace(/[\\/?*[\]:]/g, ' ').trim().slice(0, 31) || 'Blatt';
  if (!wb.SheetNames.includes(base)) return base;
  let i = 2, candidate;
  do {
    const suffix = ' (' + i + ')';
    candidate = base.slice(0, 31 - suffix.length) + suffix;
    i++;
  } while (wb.SheetNames.includes(candidate));
  return candidate;
}

function exportExcel() {
  const k = cls(); if (!k) { alert('Keine Klasse ausgewählt.'); return; }
  const wb     = XLSX.utils.book_new();
  const sorted = [...k.termine].sort((a,b)=>a.datum.localeCompare(b.datum));

  // Anwesenheit
  const anwHead = ['Name', ...sorted.map(t=>fmtDate(t.datum)+(t.thema?' – '+t.thema:'')), 'Fehltage'];
  const anwRows = k.schueler.map(s => {
    let fehlt=0;
    const cells = sorted.map(t => {
      const st=(k.anwesenheit[s.id]||{})[t.datum];
      if(st==='E'||st==='Q'||st==='U')fehlt++;
      return {A:'Anwesend',E:'Entschuldigt',Q:'Offen (?)',U:'Unentschuldigt',F:'Ausfall'}[st]||'';
    });
    return [`${s.nachname}, ${s.vorname}`, ...cells, fehlt];
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([anwHead,...anwRows]), uniqueSheetName(wb, 'Anwesenheit'));

  // Mündlich & Kursarbeit
  const obEx = isOberstufe(k.name);
  function catAvg(catObj, sid) {
    const entries = Object.values(catObj[sid] || {});
    if (!entries.length) return null;
    const vals = obEx ? entries : entries.map(r => SM_GRADES[r]);
    return vals.reduce((a,b)=>a+b,0) / vals.length;
  }
  const muHead = ['Name', ...sorted.map(t=>fmtDate(t.datum)), obEx ? 'Ø Punkte' : 'Ø Note'];
  const muRows = k.schueler.map(s => {
    const cells = sorted.map(t => {
      const r=(k.muendlich[s.id]||{})[t.datum];
      if (r===undefined) return '';
      return obEx ? `${r} (${ptsToNoteStr(r)})` : SM_LABELS[r];
    });
    const avg   = catAvg(k.muendlich, s.id);
    const avgStr = avg!==null ? (obEx ? `${avg.toFixed(1)} (${ptsToNoteStr(avg)})` : avg.toFixed(1)) : '';
    return [`${s.nachname}, ${s.vorname}`, ...cells, avgStr];
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([muHead,...muRows]), uniqueSheetName(wb, 'Mündliche Mitarbeit'));

  const kaHead = ['Name', ...sorted.map(t=>fmtDate(t.datum)), obEx ? 'Ø Punkte' : 'Ø Note'];
  const kaRows = k.schueler.map(s => {
    const cells = sorted.map(t => {
      const r=((k.kursarbeit||{})[s.id]||{})[t.datum];
      if (r===undefined) return '';
      return obEx ? `${r} (${ptsToNoteStr(r)})` : SM_LABELS[r];
    });
    const avg   = catAvg(k.kursarbeit || {}, s.id);
    const avgStr = avg!==null ? (obEx ? `${avg.toFixed(1)} (${ptsToNoteStr(avg)})` : avg.toFixed(1)) : '';
    return [`${s.nachname}, ${s.vorname}`, ...cells, avgStr];
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([kaHead,...kaRows]), uniqueSheetName(wb, 'Kursarbeit'));

  // Notenübersicht (Halbjahresnoten + Jahresnote)
  function fmtExportNote(g) {
    if (g === null) return '';
    if (obEx) { const p = Math.round(g); return `${g.toFixed(1)} (${ptsToNoteStr(p)})`; }
    return `${g.toFixed(1)} (${roundNoteGuenstig(g)})`;
  }
  const noHead = ['Name', 'Note 1. Halbjahr', 'Note 2. Halbjahr', ...(obEx ? [] : ['Jahresnote'])];
  const noRows = k.schueler.map(s => {
    const hj1 = hjNote(s.id, 1), hj2 = hjNote(s.id, 2);
    const row = [`${s.nachname}, ${s.vorname}`, fmtExportNote(hj1), fmtExportNote(hj2)];
    if (!obEx) row.push(fmtExportNote(jahresnote(s.id)));
    return row;
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([noHead,...noRows]), uniqueSheetName(wb, 'Notenübersicht'));

  // Klassenarbeiten
  k.arbeiten.forEach(arb => {
    const maxT = arb.aufgaben.reduce((s,a)=>s+(parseFloat(a.punkte)||0),0);
    const head = ['Name', ...arb.aufgaben.map(a=>`${a.name} (${a.punkte}P)`), 'Gesamt', '%', 'Note'];
    const rows = k.schueler.map(s => {
      const ergs  = arb.ergebnisse[s.id]||[];
      const earn  = ergs.reduce((s,p)=>s+(parseFloat(p)||0),0);
      const pct   = maxT ? (earn/maxT*100).toFixed(1) : '';
      return [`${s.nachname}, ${s.vorname}`, ...arb.aufgaben.map((_,oi)=>ergs[oi]!==undefined?ergs[oi]:''), `${earn}/${maxT}`, pct, arbeitGrade(arb,s.id)||''];
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([head,...rows]), uniqueSheetName(wb, arb.name));
  });

  const safeName = k.name.replace(/[\\/:*?"<>|]/g, '-');
  XLSX.writeFile(wb, `${safeName}_Klassenmanager_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function switchTab(btn) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  if (btn.dataset.tab === 'gruppen') renderGruppen(cls());
}

function fmtDate(iso) {
  if (!iso) return '';
  const [,m,d] = iso.split('-');
  return `${d}.${m}.`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
